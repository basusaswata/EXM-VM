<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Exposure Management · Diagrams</title>
<style>
:root {
  --bg: #f7f8fb; --panel: #fff; --panel-2: #f1f4f8; --panel-3: #e8ecf4;
  --text: #111827; --muted: #5b6575; --muted-2: #8892a3; --border: #d9dee8;
  --accent: #2563eb; --sidebar: #fff;
  --correlation: #2563eb; --correlation-soft: #dbeafe;
  --scoring: #7c3aed; --scoring-soft: #ede9fe;
  --outcome: #059669; --outcome-soft: #d1fae5;
  --kev: #dc2626; --kev-soft: #fee2e2;
  --crit: #dc2626; --crit-soft: #fee2e2;
  --high: #ea580c; --high-soft: #ffedd5;
  --med: #ca8a04; --med-soft: #fef9c3;
  --low: #64748b; --low-soft: #f1f5f9;
}
[data-theme="dark"] {
  --bg: #0b1020; --panel: #111827; --panel-2: #172033; --panel-3: #1f2a40;
  --text: #f8fafc; --muted: #a9b3c5; --muted-2: #8895ab; --border: #263247;
  --correlation-soft: #16284f; --scoring-soft: #2a1b49; --outcome-soft: #0f372c;
  --sidebar: #0f172a; --crit-soft: #401919; --high-soft: #4a2a10; --med-soft: #3d2e08; --low-soft: #1f2937;
  --kev-soft: #4a1919;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, sans-serif; color: var(--text); background: var(--bg); overflow: hidden; }
.app { display: flex; width: 100vw; height: 100vh; }
.sidebar { width: 232px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 14px 10px; display: flex; flex-direction: column; gap: 10px; }
.brand { padding: 8px 10px 12px; border-bottom: 1px solid var(--border); }
.brand h1 { margin: 0; font-size: 16px; font-weight: 800; }
.sibling-link { font-size: 10px; color: var(--muted); text-decoration: none; font-weight: 600; }
.sibling-link:hover { color: var(--accent); }
.scanner-list { display: flex; flex-direction: column; gap: 6px; overflow: auto; flex: 1; }
.scanner-btn { width: 100%; border: 1px solid transparent; background: transparent; color: var(--text); display: grid; grid-template-columns: 26px 1fr; gap: 8px; align-items: center; text-align: left; border-radius: 10px; padding: 8px; cursor: pointer; transition: background .15s; }
.scanner-btn:hover { background: var(--panel-2); }
.scanner-btn.active { background: color-mix(in srgb, var(--accent) 13%, transparent); border-color: color-mix(in srgb, var(--accent) 35%, var(--border)); }
.scanner-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.scanner-icon { width: 24px; height: 24px; display: grid; place-items: center; border-radius: 8px; }
.scanner-title { font-size: 12px; font-weight: 720; line-height: 1.18; display: block; }
.scanner-sub { font-size: 10px; color: var(--muted); margin-top: 2px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sidebar-footer { margin-top: auto; }
.theme-toggle { width: 100%; border: 1px solid var(--border); background: var(--panel-2); color: var(--text); border-radius: 10px; padding: 9px 10px; cursor: pointer; font-size: 12px; font-weight: 700; }
.theme-toggle:hover { background: var(--panel-3); }
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.product-banner {
  flex: 0 0 auto;
  background: linear-gradient(90deg,
    color-mix(in srgb, var(--accent) 10%, var(--panel)) 0%,
    var(--panel) 42%,
    color-mix(in srgb, #7c3aed 8%, var(--panel)) 100%);
  border-bottom: 1px solid var(--border);
  padding: 11px 18px;
  box-shadow: 0 1px 0 rgba(255,255,255,.6) inset;
}
[data-theme="dark"] .product-banner {
  box-shadow: none;
  background: linear-gradient(90deg,
    color-mix(in srgb, var(--accent) 14%, var(--panel)) 0%,
    var(--panel) 50%,
    color-mix(in srgb, #7c3aed 12%, var(--panel)) 100%);
}
.product-banner-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  flex-wrap: wrap;
  max-width: 960px;
  margin: 0 auto;
}
.product-banner-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 22px;
}
.product-banner-mark {
  width: 24px;
  height: 24px;
  border-radius: 7px;
  display: grid;
  place-items: center;
  font-size: 11px;
  font-weight: 900;
  color: #fff;
  flex-shrink: 0;
  line-height: 1;
}
.product-banner-item:nth-child(1) .product-banner-mark {
  background: linear-gradient(135deg, #2563eb, #0891b2);
}
.product-banner-item:nth-child(3) .product-banner-mark {
  background: linear-gradient(135deg, #7c3aed, #6366f1);
}
.product-banner-item:nth-child(5) .product-banner-mark {
  background: linear-gradient(135deg, #059669, #16a34a);
}
.product-banner-label {
  font-size: 12.5px;
  font-weight: 850;
  letter-spacing: -.015em;
  color: var(--text);
  white-space: nowrap;
}
.product-banner-sep {
  width: 1px;
  height: 26px;
  background: color-mix(in srgb, var(--border) 80%, var(--muted));
  flex-shrink: 0;
}
@media (max-width: 720px) {
  .product-banner-sep { display: none; }
  .product-banner-item { padding: 6px 12px; }
  .product-banner-label { font-size: 11px; white-space: normal; text-align: center; }
  .product-banner-inner { gap: 4px; justify-content: space-around; }
}
.disclaimer { font-size: 11px; font-weight: 700; padding: 8px 18px; background: color-mix(in srgb, #ea580c 12%, var(--panel)); border-bottom: 1px solid var(--border); line-height: 1.4; }
.topbar { padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--panel); display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
.topbar h2 { margin: 0; font-size: 17px; font-weight: 800; }
.topbar p { margin: 4px 0 0; font-size: 12px; color: var(--muted); }
.insights-nav-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 800; color: var(--accent); text-decoration: none;
  padding: 8px 14px; border-radius: 10px;
  border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--border));
  background: color-mix(in srgb, var(--accent) 8%, var(--panel));
  white-space: nowrap;
}
.insights-nav-link:hover { background: color-mix(in srgb, var(--accent) 14%, var(--panel)); box-shadow: 0 2px 8px rgba(37,99,235,.12); }
.insights-nav-link--back { color: var(--text); border-color: var(--border); background: var(--panel-2); }
.insights-nav-link--back:hover { border-color: var(--accent); color: var(--accent); }
.brand .sibling-link { display: inline-block; margin-top: 6px; margin-right: 10px; }
.filter-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 12px; padding: 10px 18px; background: var(--panel); border-bottom: 1px solid var(--border); }
#searchInput { flex: 1 1 200px; min-width: 180px; max-width: 320px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 12px; background: var(--panel-2); color: var(--text); }
#searchInput:focus { outline: 2px solid var(--accent); outline-offset: 0; }
.filter-chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; flex: 1 1 100%; }
.chip-group { display: inline-flex; flex-wrap: wrap; gap: 4px; align-items: center; font-size: 9px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-right: 4px; }
.chip { font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 999px; border: 1px solid var(--border); background: var(--panel-2); color: var(--muted); cursor: pointer; }
.chip.on { background: color-mix(in srgb, var(--accent) 14%, var(--panel)); color: var(--accent); border-color: var(--accent); }
.chip.clear { color: var(--text); }
.summary-line { font-size: 11px; color: var(--muted); font-weight: 600; margin-left: auto; white-space: nowrap; }

/* Exposure insights charts */
.insights-panel {
  flex: 0 0 auto;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 12px 18px 14px;
  max-height: 520px;
  overflow: auto;
  transition: max-height .25s ease, padding .25s ease;
}
.insights-panel.is-collapsed {
  max-height: 46px;
  overflow: hidden;
  padding-bottom: 10px;
}
.insights-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
}
.insights-title { margin: 0; font-size: 13px; font-weight: 900; letter-spacing: -.02em; }
.insights-sub { margin: 3px 0 0; font-size: 11px; color: var(--muted); font-weight: 600; }
.insights-toggle {
  border: 1px solid var(--border);
  background: var(--panel-2);
  color: var(--muted);
  font-size: 10px;
  font-weight: 800;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  white-space: nowrap;
}
.insights-toggle:hover { border-color: var(--accent); color: var(--accent); }
.insights-kpis {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
}
.insight-kpi {
  flex: 1 1 72px;
  min-width: 72px;
  padding: 8px 10px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--panel-2);
  text-align: center;
}
.insight-kpi-val {
  display: block;
  font-size: 18px;
  font-weight: 900;
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
  color: var(--text);
}
.insight-kpi-lbl {
  display: block;
  font-size: 8px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  margin-top: 3px;
}
.insight-kpi--crit .insight-kpi-val { color: #dc2626; }
.insight-kpi--kev .insight-kpi-val { color: #dc2626; }
.insight-kpi--net .insight-kpi-val { color: #2563eb; }
.insight-kpi--sla .insight-kpi-val { color: #ea580c; }
.insights-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
@media (max-width: 1200px) { .insights-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 640px) { .insights-grid { grid-template-columns: 1fr; } }
.insight-card {
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 12px 12px;
  min-height: 120px;
}
.insight-card--wide { grid-column: span 2; }
@media (max-width: 640px) { .insight-card--wide { grid-column: span 1; } }
.insight-card h4 {
  margin: 0 0 8px;
  font-size: 10px;
  font-weight: 850;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
}
.insight-card-hint { margin: -4px 0 6px; font-size: 9px; color: var(--muted); }
.insight-card-body { min-height: 60px; }
.insight-donut-wrap { display: flex; align-items: center; gap: 12px; }
.insight-donut-total { font-size: 16px; font-weight: 900; fill: var(--text); }
.insight-donut-label { font-size: 8px; font-weight: 700; fill: var(--muted); text-transform: uppercase; }
.insight-sev-legend { list-style: none; margin: 0; padding: 0; font-size: 10px; font-weight: 700; }
.insight-sev-legend li { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; color: var(--text); }
.insight-sev-legend li span { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.insight-bar-label, .insight-bar-val, .insight-hist-label, .insight-hist-val, .insight-axis {
  font-size: 9px; font-weight: 750; fill: var(--muted);
}
.insight-hist-val { fill: var(--text); font-weight: 850; }
.insight-bar-val { fill: var(--text); font-weight: 850; }
.insight-legend { display: flex; flex-wrap: wrap; gap: 6px 10px; margin-top: 8px; }
.insight-legend-item { font-size: 9px; font-weight: 700; color: var(--muted); display: inline-flex; align-items: center; gap: 4px; }
.insight-legend-dot { width: 7px; height: 7px; border-radius: 2px; }
.insight-empty { margin: 0; font-size: 11px; color: var(--muted); font-style: italic; }
.insights-callout {
  margin: 12px 0 0;
  padding: 10px 14px;
  font-size: 12px;
  line-height: 1.5;
  color: var(--text);
  background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 8%, var(--panel-2)), var(--panel-2));
  border: 1px solid color-mix(in srgb, var(--accent) 22%, var(--border));
  border-radius: 10px;
  font-weight: 550;
}
.insights-page {
  flex: 1;
  min-height: 0;
  max-height: none;
  overflow: auto;
  border-bottom: none;
  padding: 16px 18px 24px;
}
.insights-page .insights-grid {
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
.insights-page .insight-card { min-height: 140px; padding: 12px 14px 14px; }
.insights-page .insight-kpi-val { font-size: 22px; }
@media (max-width: 1100px) { .insights-page .insights-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 640px) { .insights-page .insights-grid { grid-template-columns: 1fr; } }

/* Top open risks hero */
.insights-top-risks {
  margin-bottom: 14px;
  padding: 12px 14px 14px;
  border-radius: 14px;
  border: 1px solid color-mix(in srgb, var(--accent) 28%, var(--border));
  background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 10%, var(--panel-2)) 0%, var(--panel-2) 55%);
}
.insights-top-risks--empty { padding: 12px 14px; }
.insights-top-risks-head { margin-bottom: 10px; }
.insights-top-risks-head h4 {
  margin: 0;
  font-size: 11px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text);
}
.insight-risk-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
@media (max-width: 900px) { .insight-risk-grid { grid-template-columns: 1fr; } }
.insight-risk-card {
  display: grid;
  grid-template-columns: auto auto 1fr;
  grid-template-rows: 1fr auto;
  gap: 0 10px;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--panel);
  text-decoration: none;
  color: inherit;
  transition: border-color .15s, box-shadow .15s, transform .15s;
  position: relative;
  overflow: hidden;
}
.insight-risk-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--risk-accent, var(--accent));
}
.insight-risk-card:hover {
  border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
  box-shadow: 0 4px 16px rgba(15,23,42,.08);
  transform: translateY(-1px);
}
.insight-risk--gold { --risk-accent: #eab308; }
.insight-risk--silver { --risk-accent: #94a3b8; }
.insight-risk--bronze { --risk-accent: #d97706; }
.insight-risk-rank {
  grid-row: span 2;
  font-size: 22px;
  font-weight: 950;
  color: var(--risk-accent, var(--muted));
  line-height: 1;
  align-self: center;
  opacity: .85;
}
.insight-risk-score {
  grid-row: span 2;
  align-self: center;
  font-size: 20px;
  font-weight: 950;
  font-variant-numeric: tabular-nums;
  color: var(--risk-color);
  background: color-mix(in srgb, var(--risk-color) 12%, var(--panel-2));
  border: 1px solid color-mix(in srgb, var(--risk-color) 35%, var(--border));
  border-radius: 10px;
  padding: 6px 8px;
  min-width: 44px;
  text-align: center;
}
.insight-risk-main { min-width: 0; }
.insight-risk-id { font-size: 10px; font-weight: 850; color: var(--muted); margin-bottom: 2px; }
.insight-risk-cve { color: var(--accent); }
.insight-risk-title {
  font-size: 12px;
  font-weight: 800;
  line-height: 1.35;
  margin-bottom: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.insight-risk-meta {
  font-size: 10px;
  color: var(--muted);
  font-weight: 650;
  display: flex;
  flex-wrap: wrap;
  gap: 4px 8px;
}
.insight-risk-owner::before { content: '·'; margin-right: 6px; opacity: .5; }
.insight-risk-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.insight-risk-badge {
  font-size: 8px;
  font-weight: 850;
  text-transform: uppercase;
  letter-spacing: .06em;
  padding: 2px 6px;
  border-radius: 999px;
  background: var(--panel-2);
  border: 1px solid var(--border);
  color: var(--muted);
}
.insight-risk-badge--kev { background: #fef2f2; border-color: #fecaca; color: #dc2626; }
.insight-risk-badge--net { background: #eff6ff; border-color: #bfdbfe; color: #2563eb; }
.insight-risk-foot {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  font-size: 10px;
}
.insight-risk-sla { font-weight: 750; color: var(--muted); }
.insight-risk-sla--overdue { color: #dc2626; font-weight: 900; }
.insight-risk-sla--urgent { color: #ea580c; font-weight: 850; }
.insight-risk-cta { font-weight: 850; color: var(--accent); white-space: nowrap; }

/* Enhanced chart widgets */
.insight-radial-wrap { display: flex; align-items: center; gap: 10px; }
.insight-gauge-val { font-size: 20px; font-weight: 950; fill: var(--text); }
.insight-gauge-lbl { font-size: 8px; font-weight: 750; fill: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.insight-matrix {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.insight-matrix-cell {
  padding: 8px 8px 7px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: color-mix(in srgb, var(--heat-color, #dc2626) calc(var(--heat, .3) * 100%), var(--panel));
  text-align: center;
}
.insight-matrix--hot { --heat-color: #dc2626; }
.insight-matrix--warm { --heat-color: #ea580c; }
.insight-matrix--mid { --heat-color: #2563eb; }
.insight-matrix--cool { --heat-color: #64748b; }
.insight-matrix-val { display: block; font-size: 20px; font-weight: 950; line-height: 1.1; color: var(--text); }
.insight-matrix-label { display: block; font-size: 8px; font-weight: 850; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-top: 2px; }
.insight-matrix-hint { display: block; font-size: 8px; font-weight: 700; color: var(--muted-2); margin-top: 1px; }
.insight-trend-wrap { width: 100%; }
.insight-trend-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; gap: 8px; }
.insight-trend-title { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
.insight-trend-delta { font-size: 9px; font-weight: 850; color: var(--muted); }
.insight-trend-delta.insight-trend--up { color: #dc2626; }
.insight-trend-delta.insight-trend--down { color: #16a34a; }
.insight-trend-day { font-size: 7px; font-weight: 750; fill: var(--muted-2); }
.insight-quadrant { font-size: 7px; font-weight: 850; fill: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
.insight-quadrant--hot { fill: #dc2626; opacity: .75; }
.insight-dot--pulse { animation: insight-pulse 1.8s ease-in-out infinite; }
@keyframes insight-pulse {
  0%, 100% { r: 5; opacity: .88; }
  50% { r: 7; opacity: 1; stroke: #dc2626; stroke-width: 2; }
}
.insight-scatter circle { cursor: default; }
.insight-scatter circle:hover { opacity: 1; stroke: var(--text); stroke-width: 1.5; }

/* Detail panel — link to diagram page */
.detail-diagram-nav { padding-top: 4px; }
.detail-diagram-hint { margin: 0 0 12px; font-size: 11px; color: var(--muted); font-weight: 600; }
.detail-diagram-links { display: flex; flex-wrap: wrap; gap: 10px; }
.diagram-nav-btn {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 850; text-decoration: none;
  padding: 10px 16px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--panel-2); color: var(--text);
  transition: border-color .15s, box-shadow .15s, transform .15s;
}
.diagram-nav-btn svg { flex-shrink: 0; opacity: .85; }
.diagram-nav-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15,23,42,.08); }
.diagram-nav-btn--corr { border-color: color-mix(in srgb, var(--accent) 35%, var(--border)); color: var(--accent); }
.diagram-nav-btn--corr:hover { background: color-mix(in srgb, var(--accent) 10%, var(--panel-2)); }
.diagram-nav-btn--attack { border-color: color-mix(in srgb, #7c3aed 35%, var(--border)); color: #6d28d9; }
[data-theme="dark"] .diagram-nav-btn--attack { color: #c4b5fd; }
.diagram-nav-btn--attack:hover { background: color-mix(in srgb, #7c3aed 10%, var(--panel-2)); }

function bpAge(h){return h<24?`${h}h ago`:`${Math.floor(h/24)} day${Math.floor(h/24)>1?'s':''} ago`;}
function bpRepoName(asset){return asset.includes(':')?asset.split(':')[0]:asset.replace(/\s*\(.*\)/,'').trim();}

const BP_BUILD_ENVS=[
  {environment:'production',envKey:'prod',envLabel:'Production CI',agentPool:'k8s-build-agents-prod-us-east-1',region:'us-east-1'},
  {environment:'staging',envKey:'staging',envLabel:'Staging CI',agentPool:'k8s-build-agents-stg-us-east-1',region:'us-east-1'},
  {environment:'development',envKey:'dev',envLabel:'Development CI',agentPool:'github-hosted · ubuntu-22.04',region:'us-west-2'}
];

function bpApplyBuildEnv(build,n){
  const env=BP_BUILD_ENVS[n%BP_BUILD_ENVS.length];
  return {...build,...env};
}

function bpBuildEnvLine(b){
  if(!b) return '';
  return `${b.envLabel||b.environment} · ${b.system} · ${b.agentPool||'default agents'}${b.region?` · ${b.region}`:''}`;
}

function bpBuildGraphHint(bp){
  if(!bp?.build) return {label:'Build',sub:'',sub2:''};
  const b=bp.build;
  const env=String(b.envLabel||b.environment||'').replace('Production','Prod').replace('Staging','Stg').replace('Development','Dev');
  const sys=String(b.system||'').replace('GitHub Actions','GHA').replace('Azure Pipelines','Azure CI').replace('GitLab CI','GitLab');
  return {label:'Build',sub:b.buildId,sub2:`${env} · ${sys}`.trim()};
}

function buildBuildPipeline(seed,sid){
  if(!PIPELINE_SCANNERS.has(sid)) return null;
  if(PIPELINE_PRESETS[seed.id]) return {...PIPELINE_PRESETS[seed.id]};
  const n=seed.id.charCodeAt(4)+seed.id.charCodeAt(5);
  const repo=bpRepoName(seed.asset);
  const orgRepo=`acme-payments/${repo}`.replace(/\/+/g,'/');
  const authors=['Sarah Chen','Marcus Webb','Priya Nair','James Okonkwo'];
  const systems=['Jenkins','GitHub Actions','GitLab CI','CircleCI','Azure Pipelines'];
  const prStates=['merged','merged','precaught','blocked'];
  const prState=prStates[n%4];
  const base={
    repo:{name:orgRepo,branch:'main',commitShort:(n*17%0xffff).toString(16).slice(0,7),author:authors[n%4],ageHours:48+(n%96)},
    prStatus:{state:prState,prNumber:1100+(n%200),prUrl:'#',detail:prState==='merged'?'Security gate passed at merge':prState==='precaught'?'Fixed in follow-up PR before merge':'Blocked at PR — override for hotfix'},
    build:bpApplyBuildEnv({system:systems[n%5],buildId:`build-${4000+n}`,buildUrl:'#',ageHours:36+(n%48),status:n%7===0?'failed':'passed',note:'Pipeline scan completed'},n),
    artifact:{name:sid==='container'?`registry.internal/${repo}`:`${repo}`,version:sid==='container'?`${repo}:v${4+(n%3)}.${n%10}`:`v2.${n%9}.0`,digest:`sha256:${(n*991).toString(16).slice(0,4)}…`,registry:'JFrog Artifactory'},
    registry:{name:'JFrog Artifactory',path:'prod-releases',scanStatus:'digest on file'},
    deployment:{tool:'ArgoCD',app:`${repo.replace(/[^a-z0-9-]/gi,'-')}-prod`,cluster:'eks-prod-us-east-1',namespace:seed.owner.split(' ')[0].toLowerCase(),podCount:4+(n%20),syncedAgo:bpAge(36+(n%48))}
  };
  if(sid==='sca'){
    base.reachability={confirmed:seed.score>=7,callsPerDay:seed.score>=7?'1,200×/day':'Not loaded at runtime',entryPoint:seed.internet?'Inbound API traffic':'Internal batch only',sensor:'Runtime SBOM sensor'};
    base.dependencyChain=[repo,'spring-boot-starter-web','spring-core',seed.cve?seed.cve.replace('CVE-','lib-'):'vuln-lib'];
    base.manifestFile=n%2?'pom.xml':'package-lock.json';
    base.resolvedVersion=`${2+(n%3)}.${10+(n%5)}.${n%10}`;
  }
  if(sid==='sast'){
    base.reachability={confirmed:seed.score>=7.5,callsPerDay:seed.score>=7.5?'Called from prod entry':'Dead code path — never invoked',entryPoint:seed.internet?'/api public routes':'Internal admin only',sensor:'IAST + APM traces'};
  }
  if(sid==='container'){
    base.baseImageLineage=[
      {name:`${repo}:v4.${n%3}`,layer:'app'},
      {name:'internal-base/java17:2024-01',layer:'intermediate'},
      {name:'eclipse-temurin:17-jre',layer:'base'},
      {name:'ubuntu:22.04',layer:'os'}
    ];
    base.vulnerableLayer=n%5===0?'os':n%3===0?'base':'app';
    base.note='Image built from application repo Dockerfile';
  }
  return base;
}


function bpPill(state){
  const m={
    merged:{cls:'bp-ok',label:'Merged'},
    precaught:{cls:'bp-warn',label:'Pre-PR catch'},
    blocked:{cls:'bp-bad',label:'Blocked at PR'},
    passed:{cls:'bp-ok',label:'✓ Passed'},
    failed:{cls:'bp-bad',label:'✗ Failed'}
  };
  const x=m[state]||{cls:'bp-neutral',label:state};
  return `<span class="bp-pill ${x.cls}">${esc(x.label)}</span>`;
}

function renderBpChain(bp,sid){
  if(sid==='sca'&&bp.dependencyChain){
    const links=bp.dependencyChain.map((name,i)=>{
      const vuln=i===bp.dependencyChain.length-1;
      return `<span class="bp-chain-link ${vuln?'bp-chain-vuln':''}">${esc(name)}</span>`;
    }).join('<span class="bp-chain-sep">›</span>');
    return `<div class="bp-extra"><div class="bp-extra-label">Dependency chain</div><div class="bp-chain">${links}</div><div class="bp-mono">${esc(bp.manifestFile)} → resolved <strong>${esc(bp.resolvedVersion)}</strong></div></div>`;
  }
  if(sid==='container'&&bp.baseImageLineage){
    const links=bp.baseImageLineage.map(row=>{
      const vuln=row.layer===bp.vulnerableLayer;
      return `<span class="bp-chain-link ${vuln?'bp-chain-vuln':''}" title="${esc(row.layer)} layer">${esc(row.name)}</span>`;
    }).join('<span class="bp-chain-sep">›</span>');
    return `<div class="bp-extra"><div class="bp-extra-label">Base image lineage · vuln in <strong>${esc(bp.vulnerableLayer)}</strong> layer</div><div class="bp-chain">${links}</div>${bp.note?`<div class="bp-mono">${esc(bp.note)}</div>`:''}</div>`;
  }
  return '';
}

function renderBuildPipelineCard(e){
  const bp=e.buildPipeline;
  if(!bp) return '';
  const sid=e.scannerId;
  const stages=[
    {icon:'git',title:'Git repository',mono:`${bp.repo.name} · ${bp.repo.branch} · ${bp.repo.commitShort} · ${bp.repo.author} · ${bpAge(bp.repo.ageHours)}`,pill:null},
    {icon:'git',title:'PR / merge status',mono:bp.prStatus.detail+(bp.prStatus.prNumber?` · PR #${bp.prStatus.prNumber}`:''),pill:bpPill(bp.prStatus.state)},
    {icon:'server',title:'Build',mono:`${bp.build.buildId} · ${bpBuildEnvLine(bp.build)} · ${bpAge(bp.build.ageHours)}${bp.build.note?' · '+bp.build.note:''}`,pill:bpPill(bp.build.status)},
    {icon:'package',title:'Artifact',mono:`${bp.artifact.name}${bp.artifact.version?':'+bp.artifact.version:''} · ${bp.artifact.registry} · digest ${bp.artifact.digest}`,pill:null},
    {icon:'container',title:'Registry / artifact store',mono:`${bp.registry.name} · ${bp.registry.path} · ${bp.registry.scanStatus}`,pill:null},
    {icon:'cloud',title:'Deployment trail',mono:`${bp.deployment.tool} ${bp.deployment.app} → ${bp.deployment.cluster} ns ${bp.deployment.namespace} · ${bp.deployment.podCount} pods · ${bp.deployment.syncedAgo}`,pill:null}
  ];
  if(sid!=='container'&&bp.reachability){
    const r=bp.reachability;
    stages.push({icon:'shield',title:'Reachability',mono:r.confirmed?`${r.sensor}: ${r.entryPoint} · ${r.callsPerDay}`:`Not confirmed in prod — ${r.callsPerDay||'sensor offline'}`,pill:bpPill(r.confirmed?'passed':'blocked')});
  }
  const flow=stages.map((st,i)=>`
    <div class="bp-stage">
      <div class="bp-stage-rail">${i>0?'<div class="bp-connector"></div>':''}<div class="bp-dot">${icon(st.icon,14)}</div></div>
      <div class="bp-stage-body">
        <div class="bp-stage-head"><span class="bp-stage-title">${esc(st.title)}</span>${st.pill||''}</div>
        <div class="bp-mono">${esc(st.mono)}</div>
      </div>
    </div>`).join('');
  return `<div class="station-card bp-wide bp-pipeline-card" data-pipeline-card>
    <div class="station-head">${icon('container',14)}<span>Build Pipeline</span></div>
    <div class="bp-flow">${flow}</div>
    ${renderBpChain(bp,sid)}
  </div>`;
}

function renderBuildPipelineDetail(e){
  return renderBuildPipelineCard(e).replace('data-pipeline-card','');
}

function renderStationCards(e){
  const parts=[];
  e.stations.forEach(s=>{
    if(s.k==='buildPipeline') return;
    if(s.k==='asset'&&e.buildPipeline){
      parts.push(`<div class="station-card ${s.scm?'scm-station':''}"><div class="station-head">${icon(s.icon,14)}<span>${esc(s.name)}</span></div>${s.lines.map(l=>`<div class="station-line">${esc(l)}</div>`).join('')}</div>`);
      parts.push(renderBuildPipelineCard(e));
      return;
    }
    parts.push(`<div class="station-card ${s.scm?'scm-station':''} ${s.k==='runtime'?'runtime-station':''}"><div class="station-head">${icon(s.icon,14)}<span>${esc(s.name)}</span></div>${s.lines.map(l=>`<div class="station-line">${esc(l)}</div>`).join('')}</div>`);
  });
  return `<div class="station-grid station-grid-extended">${parts.join('')}</div>`;
}

function stationCountLabel(e){
  const n=e.stations.filter(s=>s.k!=='buildPipeline').length+(e.buildPipeline?1:0);
  return `${n} sources`;
}

function seedMeta(seed){
  const n=(seed.id.charCodeAt(4)||48)*19+(seed.id.charCodeAt(5)||48);
  const oct3=18+(n%200), oct4=7+(n%240);
  const slug=String(seed.asset).replace(/:.*$/,'').replace(/\..*$/,'').replace(/[^a-z0-9-]+/gi,'-').slice(0,24);
  return {
    ip: seed.ip || `10.42.${oct3}.${oct4}`,
    host: seed.host || (/\./.test(seed.asset)?seed.asset:`${slug}.use1.${DOMAIN}`),
    jira: seed.jira || `PAY-${4200+(n%900)}`,
    epss: seed.epss ?? (seed.kev?0.91+((n%8)/100):0.08+((n%72)/100)),
    cvss: seed.cvss ?? (seed.score>=9?9.8:seed.score>=7?7.4:5.1),
    discovered: seed.discovered || `${4+(n%48)}h ago`,
    cmdb: seed.cmdb || `cmdb:service/${10000+n}`,
    qid: seed.qid || `QID-${379000+(n%999)}`,
    plugin: seed.plugin || `Plugin ${190000+(n%9999)}`
  };
}

function deriveRepo(asset){
  const a=String(asset);
  if (a.includes(' repo')) return a.replace(/\s*repo$/i,'').trim();
  if (a.includes('/')) return a.split('/').pop().trim();
  if (a.includes(':')) return a.split(':')[0].trim();
  if (a.includes('.')) return a.split('.')[0].replace(/^pay-/,'').replace(/-prod.*/,'')||'service';
  return a.replace(/\s*\([^)]*\)/g,'').trim();
}

function scmFileHint(seed, sid){
  const t=seed.title.toLowerCase();
  if (sid==='sast') return t.includes('injection')?'payments-api/.../ChargeController.java:142':t.includes('xss')?'templates/profile.html':'src/main/...';
  if (sid==='sca') return t.includes('log4')?'pom.xml · log4j-core 2.14.1':'package-lock.json / go.mod';
  if (sid==='secrets') return seed.asset.includes('.py')?seed.asset:seed.asset.includes('workflow')?'.github/workflows/deploy.yml':seed.asset.includes('gist')?'external gist':`.env · ${seed.asset}`;
  if (sid==='container') return 'Dockerfile · dependency layers in repo';
  if (sid==='iac') return iacPathHint(seed);
  return 'manifest / lockfile';
}

function iacPathHint(seed){
  const t=seed.title.toLowerCase();
  if(t.includes('s3')) return 'terraform/modules/s3-bucket/main.tf';
  if(t.includes('rds')||t.includes('ingress')) return 'terraform/network/database.tf';
  if(t.includes('eks')) return 'terraform/eks/cluster.tf';
  return seed.asset.includes('.tf')?seed.asset:'infrastructure/**/*.tf';
}

function buildCodeAssetParts(seed, sid, bp){
  const meta=seedMeta(seed);
  const repo=deriveRepo(seed.asset);
  const orgRepo=`${ORG}/${repo}`;
  const sha=seed.commit||`${seed.id.replace(/[^A-Z0-9]/gi,'').slice(0,7).toLowerCase()}a3f8e92`;
  const pr=seed.pr||(1100+(seed.id.charCodeAt(4)%200));
  const branch=seed.status==='In progress'?`fix/${seed.id.toLowerCase()}`:'main';

  if(sid==='sca'){
    const pkg=seed.cve&&seed.title.includes('log4j')?'log4j-core 2.14.1':scmFileHint(seed,sid);
    return {
      originShort:`${repo} · ${scmFileHint(seed,sid).split(' · ')[0]||'manifest'}`,
      deployShort:seed.asset.includes(':')?seed.asset.split(':').pop():`${repo}:prod`,
      originLines:[
        `① Origin in source`,
        `Repo: github.com/${orgRepo}`,
        `Branch: ${branch} · commit ${sha}`,
        `Path: ${scmFileHint(seed,sid)}`,
        `Package: ${pkg} — where scanner found the vuln`
      ],
      deployLines:[
        `② Deploy artifact`,
        `Service / image: ${seed.asset}`,
        bp?`Registry: ${bp.artifact.name.split('/').pop()}:${bp.artifact.version}`:'',
        bp?`Digest: ${bp.artifact.digest}`:'',
        bp?`Running: ${bp.deployment.cluster} · ${bp.deployment.namespace} · ${bp.deployment.podCount} pods`:'Prod if build reached deploy',
        `Where the vulnerable component exists in prod`
      ].filter(Boolean)
    };
  }
  if(sid==='sast'){
    return {
      originShort:`${repo} · ${scmFileHint(seed,sid).split('/').pop()}`,
      deployShort:`${repo} · prod`,
      originLines:[
        `① Origin in source`,
        `Repo: github.com/${orgRepo}`,
        `File: ${scmFileHint(seed,sid)}`,
        `PR #${pr} · commit ${sha}`,
        `Flaw introduced / detected in source`
      ],
      deployLines:[
        `② Deploy artifact`,
        `Service: ${repo} (payments-api)`,
        bp?`Artifact: ${bp.artifact.version} · ${bp.deployment.tool}`:'Deployed via main → prod',
        bp?`Reachability: ${bp.reachability?.entryPoint||'prod entry path'}`:'',
        `Executable path in production runtime`
      ].filter(Boolean)
    };
  }
  if(sid==='container'){
    const img=seed.asset.includes('/')?seed.asset.split('/').pop():seed.asset;
    return {
      originShort:`${orgRepo} · Dockerfile`,
      deployShort:img,
      originLines:[
        `① Origin in source`,
        `Repo: github.com/${orgRepo}`,
        `Dockerfile / CI build context`,
        `Commit: ${sha} — image built from this repo`,
        `Vuln in layer introduced at build time`
      ],
      deployLines:[
        `② Deploy artifact`,
        `Image: ${seed.asset}`,
        bp?`Digest: ${bp.artifact.digest}`:'',
        bp?`Cluster: ${bp.deployment.cluster} · ${bp.deployment.namespace}`:'',
        bp?`Pods: ${bp.deployment.podCount} · synced ${bp.deployment.syncedAgo}`:'',
        `Where image runs — vuln exists in container`
      ].filter(Boolean)
    };
  }
  if(sid==='iac'){
    return {
      originShort:`${orgRepo} · ${iacPathHint(seed).split('/').pop()}`,
      deployShort:seed.asset.replace(/^arn:aws:[^:]+::/,'').slice(0,40),
      originLines:[
        `① Origin in source`,
        `Repo: github.com/${orgRepo}`,
        `IaC path: ${iacPathHint(seed)}`,
        `PR #${pr} · policy as code`,
        `Misconfiguration defined in Terraform/Bicep`
      ],
      deployLines:[
        `② Deploy target`,
        `Resource: ${seed.asset}`,
        `Account: prod-payments (112233445566)`,
        `Drift check: deployed vs declared`,
        `Where risk lands if this code is applied`
      ]
    };
  }
  return {originShort:orgRepo,deployShort:seed.asset,originLines:[],deployLines:[]};
}

function bpAssetGraphHint(seed, sid, bp){
  if(!CODE_ORIGIN_SCANNERS.has(sid)) return null;
  const p=buildCodeAssetParts(seed,sid,bp);
  return {label:'Asset',sub:`① ${p.originShort}`,sub2:`② ${p.deployShort}`};
}

function buildScmStation(seed, sid){
  const meta=seedMeta(seed);
  const repo=deriveRepo(seed.asset);
  const orgRepo=`${ORG}/${repo}`.replace(/\/+/g,'/');
  const branch=seed.status==='In progress'?`fix/${seed.id.toLowerCase()}-cve`:seed.status==='Patched'?'main':'main';
  const sha=seed.commit||`${seed.id.replace(/[^A-Z0-9]/gi,'').slice(0,7).toLowerCase()}a3f8e92`;
  const pr=seed.pr||(1100+(seed.id.charCodeAt(4)%200));
  return {
    k:'scm', name:'SCM context', icon:'git', scm:true,
    lines:[
      `Platform: ${SCM_PLATFORM[sid]}`,
      `Repository: github.com/${orgRepo}`,
      `Branch: ${branch} · required reviews: 2`,
      `Commit: ${sha} · ${meta.discovered}`,
      `PR #${pr} · ${seed.status==='In progress'?'checks failing':'merged'}`,
      `Path: ${scmFileHint(seed, sid)}`,
      `Scan: ${seed.tool} · ${meta.jira} linked`
    ]
  };
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function statusLabel(s){return s==='Compensating control'?'com-ctl':s;}
function icon(name,size=17){return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">${ICONS[name]||ICONS.shield}</svg>`;}

function band(score){if(score>=8)return 'Critical';if(score>=6)return 'High';if(score>=3)return 'Medium';return 'Low';}
function bandClass(b){return ({Critical:'sev-critical',High:'sev-high',Medium:'sev-medium',Low:'sev-low'}[b]);}

function buildScoring(seed){
  const meta=seedMeta(seed);
  const s=seed.score;
  const kev=seed.kev?2.0:1.0;
  const epss=Number(meta.epss.toFixed(2));
  const reach=seed.internet?1.4:1.0;
  const crit=s>=8?2.0:s>=6?1.5:1.0;
  const ctrl=seed.status==='Compensating control'?1.5:seed.status==='Patched'?2.0:1.2;
  const base=5.0;
  return {
    base, result:s.toFixed(1), cvss:meta.cvss, epss,
    expr:`Base ${base} × KEV ${kev} × EPSS ${epss} × Reach ${reach} × Crit ${crit} ÷ Controls ${ctrl} = ${s.toFixed(1)} (CVSS ${meta.cvss})`,
    pills:[
      {l:'KEV match',w:seed.kev?'×2.0':'×1.0'},
      {l:`EPSS ${epss}`,w:`×${epss}`},
      {l:'Reach',w:`×${reach}`},
      {l:'Asset crit',w:`×${crit}`},
      {l:'Controls',w:`÷${ctrl}`}
    ]
  };
}

function buildStations(seed, sid){
  const meta=seedMeta(seed);
  const a=seed.asset;
  const net=seed.internet?'Internet-facing · ALB `pay-api`':'Internal · private subnet';
  const repo=deriveRepo(a);
  const bp=PIPELINE_SCANNERS.has(sid)?buildBuildPipeline(seed,sid):null;
  const codeParts=CODE_ORIGIN_SCANNERS.has(sid)?buildCodeAssetParts(seed,sid,bp):null;
  const assetLines=codeParts
    ? [...codeParts.originLines,...codeParts.deployLines]
    : PIPELINE_SCANNERS.has(sid)
    ? [`Artifact: ${a}`,`Registry: jfrog.acmepay.internal`,`Cluster: eks-prod-use1 · ns payments`,`CI/CD: ${bp?.build?.system||'CI'} · ${bp?.build?.buildId||'—'}`]
    : SCM_SCANNERS.has(sid)
    ? [`Repo: ${ORG}/${repo}`,`Service: ${a}`,`Branch policy: main + release/*`,`Deploy: prod-us-east-1`]
    : sid==='dast'
    ? [`Target: ${a}`,`Route: CloudFront → ALB → EKS`,`Catalog: Apigee registry · v2.3`,`Zone: production`]
    : sid==='cspm'
    ? [`Resource: ${a}`,`Account: 112233445566 (prod-payments)`,`Region: us-east-1`,`ARN: arn:aws:s3:::${repo}`]
    : sid==='easm'
    ? [`Asset: ${a}`,`Attribution: ${seed.owner} (87% conf.)`,`ASN: AS16509 · us-east-1`,`First seen: ${meta.discovered}`]
    : [`CMDB: ${meta.cmdb}`,`Host: ${meta.host}`,`IPv4: ${meta.ip} · vpc-prod-payments`,`OS: RHEL 8.9 / Windows 2022`,net];
  const runtimeLines=[
    `EDR: ${RUNTIME_BY_SCANNER[sid]||'CrowdStrike Falcon 7.10'}`,
    `Sensor: ${seed.kev?'IOA-SSL-Overflow · monitoring':'No IOA in 30d'}`,
    `WAF: ${seed.internet?'AWS WAFv2 · pay-api-prod ACL':'Out of request path'}`,
    `NDR: ${seed.internet?'Vectra · east-west':'Internal only'}`
  ];
  if(sid==='container'&&bp){
    runtimeLines.push(`Running: ${bp.artifact.digest} · ${bp.deployment.podCount} pods`);
    runtimeLines.push(`Cluster: ${bp.deployment.cluster} · ${bp.deployment.namespace}`);
    if(bp.reachability){
      const r=bp.reachability;
      runtimeLines.push(r.confirmed?`${r.sensor}: ${r.entryPoint} · ${r.callsPerDay}`:'Reachability: not confirmed in prod');
    }
  }
  const assetStation=codeParts
    ?{k:'asset',name:'Asset — origin & deploy',icon:'git',dualAsset:true,originLines:codeParts.originLines,deployLines:codeParts.deployLines,lines:assetLines}
    :{k:'asset',name:'Asset graph',icon:SCM_SCANNERS.has(sid)?'git':'server',lines:assetLines};
  const stations=[
    assetStation,
    ...(PIPELINE_SCANNERS.has(sid)&&bp?[{k:'buildPipeline',name:'Build Pipeline',icon:'container',isPipeline:true,lines:[`Build ID: ${bp.build.buildId}`,`Environment: ${bp.build.envLabel||bp.build.environment}`,`${bp.build.system} · ${bp.build.agentPool||'agents'} · ${bp.build.region||'—'}`]}]:[]),
    ...(SCM_SCANNERS.has(sid)&&!PIPELINE_SCANNERS.has(sid)&&!CODE_ORIGIN_SCANNERS.has(sid)?[buildScmStation(seed, sid)]:[]),
    {k:'identity',name:'Identity graph',icon:'shield',lines:[`Instance profile: ${repo}-prod-role`,`Attached policies: 4 · 2 wildcards`,`Service account: svc-${repo.slice(0,12)}@acmepay.internal`,`Blast: ${seed.score>=8?'S3 cardholder · RDS payments':'read-only logs'}`]},
    {k:'threat',name:'Threat intel',icon:'shield',lines:[`KEV: ${seed.kev?`CVE ${seed.cve||'listed'} · CISA catalog`:'Not listed'}`,`EPSS: ${meta.epss} · 30d Δ ${seed.kev?'+12%':'flat'}`,`CVSS: ${meta.cvss} · ${seed.tool.split(' ')[0]}`,`Exploit: ${seed.kev?'Metasploit · CISA AA24-131A':'No public exploit'}`]},
    {k:'ownership',name:'Ownership',icon:'git',lines:[`Team: ${seed.owner}`,`Jira: ${meta.jira} · ${seed.status}`,`PagerDuty: ${seed.owner.split(' ')[0].toUpperCase()}-oncall`,`Slack: #${seed.owner.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,22)}`]},
    {k:'business',name:'Business context',icon:'shield',lines:[`App: Transaction Processing`,`Tier: ${seed.score>=8?'0 — revenue critical':'2 — internal'}`,`Data: ${seed.internet?'PAN adjacent · tokenized':'Ops metadata'}`,`Compliance: ${/payment|pay/i.test(seed.owner)?'PCI DSS 4.0 · SOX':'SOC2 Type II'}`]},
    {k:'runtime',name:'Runtime controls',icon:'shield',lines:runtimeLines}
  ];
  return stations;
}

function buildOutcomes(seed, sid){
  const meta=seedMeta(seed);
  const o=[];
  const ticket={type:`${meta.jira} · patch`,dest:'Jira Cloud',owner:seed.owner,sla:seed.score>=9?'P0 · 24h':seed.score>=7?'P1 · 72h':'P2 · 14d',auto:'Semi'};
  if(sid==='secrets'||seed.title.toLowerCase().includes('secret')||seed.title.toLowerCase().includes('key')){
    o.push({type:'Rotation runbook',dest:'Vault · IAM',owner:seed.owner,sla:'P0',auto:'Auto'});
    o.push({type:'Usage audit + IR',dest:'SIEM · case mgmt',owner:'Incident Response',sla:'P0',auto:'Manual'});
  } else if(sid==='sca'||sid==='sast'){
    o.push({type:'Auto-fix PR',dest:'GitHub',owner:seed.owner,sla:'PR cycle',auto:'Auto'});
    o.push(ticket);
  } else if(sid==='dast'||sid==='network'||sid==='container'){
    o.push({type:'Compensating control',dest:'WAF · EDR · NDR',owner:'SecOps',sla:'P1',auto:'Semi'});
    o.push(ticket);
  } else {
    o.push(ticket);
    if(seed.status==='Compensating control'||seed.score>=7)
      o.push({type:'EDR containment policy',dest:'CrowdStrike console',owner:'SecOps',sla:'P1',auto:'Semi'});
  }
  if(seed.score>=8.5) o.push({type:'Exec visibility',dest:'Risk dashboard',owner:'GRC',sla:'Weekly',auto:'Auto'});
  return o.slice(0,3);
}

function buildTimeline(seed, sid){
  const meta=seedMeta(seed);
  const repo=deriveRepo(seed.asset);
  const bp=PIPELINE_SCANNERS.has(sid)?buildBuildPipeline(seed,sid):null;
  const scanLine=sid==='network'?{t:'Vuln scan ingested',d:meta.discovered,by:`${seed.tool} · ${meta.plugin}`}
    :sid==='dast'?{t:'DAST proof captured',d:meta.discovered,by:`Burp scan · session 8f2c`}
    :{t:'Finding ingested',d:meta.discovered,by:seed.tool};
  return [
    ...(bp?[{t:'CI/CD artifact linked',d:'52h ago',by:`${bp.build.system} ${bp.build.buildId} · ${bp.artifact.digest}`}]:[]),
    ...(SCM_SCANNERS.has(sid)&&!PIPELINE_SCANNERS.has(sid)?[{t:'SCM commit correlated',d:'48h ago',by:`${ORG}/${repo} @ main`}]:[]),
    scanLine,
    {t:'Exposure record created',d:'47h ago',by:`${seed.id} · score ${seed.score.toFixed(1)}`},
    {t:'Correlation complete',d:'46h ago',by:'Splunk SOAR · CMDB + KEV'},
    {t:`${meta.jira} assigned`,d:'45h ago',by:seed.owner},
    ...(seed.status==='Compensating control'?[{t:'Virtual patch deployed',d:'22h ago',by:'SecOps · WAF custom rule'}]:[]),
    ...(seed.status==='In progress'?[{t:'Change CHG0048211 staging',d:'6h ago',by:seed.owner}]:[]),
    ...(seed.status==='Patched'?[{t:'Rescan clean',d:'14h ago',by:seed.tool}]:[])
  ];
}

function enrich(seed, scannerId){
  const sc=SCANNERS.find(x=>x.id===scannerId);
  const b=band(seed.score);
  const meta=seedMeta(seed);
  const bp=PIPELINE_SCANNERS.has(scannerId)?buildBuildPipeline(seed,scannerId):null;
  const codeParts=CODE_ORIGIN_SCANNERS.has(scannerId)?buildCodeAssetParts(seed,scannerId,bp):null;
  return {...seed,...meta,
    assetOrigin:codeParts?.originShort||null,
    assetDeploy:codeParts?.deployShort||null,
    scannerId,scannerName:sc.scannerLabel,accent:sc.accent,
    severity:b,severityClass:bandClass(b),
    crossLinks:CROSS_LINKS[seed.id]||[],
    scoring:buildScoring(seed),stations:buildStations(seed,scannerId),
    buildPipeline:bp,
    outcomes:buildOutcomes(seed,scannerId),timeline:buildTimeline(seed,scannerId),

function truncate(s,n){const t=String(s);return t.length<=n?t:t.slice(0,Math.max(1,n-1))+'…';}
function fitCharsForWidth(w,fontSize,isMono){
  const avg=isMono?5.2:fontSize<=8?5.6:5.9;
  return Math.max(4,Math.floor((w-12)/avg));
}
function fitBoxLine(text,maxChars){
  const s=String(text||'');
  if(!s||s.length<=maxChars) return s;
  if(maxChars<=3) return s.slice(0,maxChars);
  return s.slice(0,maxChars-1)+'…';
}
function corrShortLabel(name){
  const n=String(name);
  const map={
    'Asset graph':'Asset','Asset — origin & deploy':'Asset','Identity graph':'Identity','Threat intel':'Threat',
    'Business context':'Business','Build Pipeline':'Build','Runtime controls':'Runtime',
    'Ownership':'Owner','SCM context':'SCM','Build pipeline':'Build',
    'SBOM lineage':'SBOM','Runtime presence':'Runtime','Reachability':'Reach',
    'Image digest':'Digest','Runtime ctx':'Runtime','CNAPP overlay':'CNAPP',
    'Cross-link DAST/SCA':'X-link','Cross-link SAST':'X-link','Taint analysis':'Taint',
    'Threat intel':'Threat'
  };
  if(map[n]) return map[n];
  return n.replace(/ graph$/i,'').replace(/^Business /,'Biz ');
}
function fitCorrBoxText(label,sub,sub2,w){
  const labelMax=fitCharsForWidth(w,10,false);
  const subMax=fitCharsForWidth(w,9,true);
  const sub2Max=fitCharsForWidth(w,8,false);
  return {
    label:fitBoxLine(corrShortLabel(label),labelMax),
    sub:fitBoxLine(sub,subMax),
    sub2:fitBoxLine(sub2,sub2Max)
  };
}
function stationBoxClass(s){
  if(!s) return '';
  if(s.isPipeline||s.k==='buildPipeline') return 'is-pipeline';
  if(s.k==='runtime') return 'is-runtime';
  return '';
}

const CORR_BOX_W=118,CORR_BOX_H=40,CORR_HUB_R=50;
const CORR_TOP_GAP=26;

function corrTopLayout(hasPipeline){
  if(!hasPipeline) return {W:860,H:360,cx:430,cy:188,topY:44,botY:298,topXs:[100,270,440,610],botXs:[220,430,640],topDims:null};
  const topW=108,buildW=124,topH=54,buildH=60,gap=CORR_TOP_GAP;
  const total=4*topW+buildW+4*gap;
  const W=Math.max(1120,total+120);
  const cx=W/2,cy=196,topY=46,botY=306;
  let x=(W-total)/2+topW/2;
  const topXs=[];
  const topDims=[];
  for(let i=0;i<5;i++){
    const isBuild=i===2;
    const w=isBuild?buildW:topW;
    const h=isBuild?buildH:topH;
    topXs.push(x);
    topDims.push({w,h});
    x+=w/2+gap+w/2;
  }
  const botXs=[W*0.26,W*0.5,W*0.74];
  return {W,H:388,cx,cy,topY,botY,topXs,botXs,topDims};
}

function corrBoxAnchor(bx,by,w,h,tcx,tcy){
  const cx=bx+w/2,cy=by+h/2,dx=tcx-cx,dy=tcy-cy;
  if(Math.abs(dx)<1e-6&&Math.abs(dy)<1e-6) return {x:cx,y:cy};
  const scale=Math.min(Math.abs(w/2/dx),Math.abs(h/2/dy));
  return {x:cx+dx*scale,y:cy+dy*scale};
}

function corrHubAnchor(cx,cy,r,tx,ty){
  const dx=tx-cx,dy=ty-cy,len=Math.hypot(dx,dy)||1;
  return {x:cx+(dx/len)*r,y:cy+(dy/len)*r};
}

function corrSpokePath(hx,hy,bx,by){
  const mx=(hx+bx)/2,my=(hy+by)/2;
  return `M ${hx} ${hy} Q ${mx} ${my} ${bx} ${by}`;
}

function renderCorrBox(cx,cy,label,boxCls,wrapAttrs,opts){
  const w=opts?.w||CORR_BOX_W,h=opts?.h||CORR_BOX_H;
  const rawSub=opts?.sub||'',rawSub2=opts?.sub2||'';
  const fit=fitCorrBoxText(label,rawSub,rawSub2,w);
  const x=cx-w/2,y=cy-h/2;
  const subCls=fit.sub||fit.sub2?' has-sub':'';
  return `<g class="corr-box-wrap" ${wrapAttrs}>
    <foreignObject x="${x}" y="${y}" width="${w}" height="${h}">
      <div xmlns="http://www.w3.org/1999/xhtml" class="corr-box ${boxCls}${subCls}" style="width:${w}px;height:${h}px">
        <span class="corr-box-label">${esc(fit.label)}</span>
        ${fit.sub?`<span class="corr-box-sub">${esc(fit.sub)}</span>`:''}
        ${fit.sub2?`<span class="corr-box-sub2">${esc(fit.sub2)}</span>`:''}
      </div>
    </foreignObject>
  </g>`;
}

function renderCorrelationGraph(e){
  const byKey={};
  e.stations.forEach((s,i)=>{byKey[s.k]={...s,idx:i};});
  const uid=e.id.replace(/[^a-zA-Z0-9]/g,'');
  const hasPipeline=PIPELINE_SCANNERS.has(e.scannerId)&&!!byKey.buildPipeline;
  const layout=corrTopLayout(hasPipeline);
  const {W,H,cx,cy,topY,botY,topXs,botXs,topDims}=layout;
  const title=fitBoxLine(e.title,fitCharsForWidth(96,8.5,false)*2);
  const bpHint=hasPipeline?bpBuildGraphHint(e.buildPipeline):null;
  const assetHint=CODE_ORIGIN_SCANNERS.has(e.scannerId)?bpAssetGraphHint(e,e.scannerId,e.buildPipeline):null;

  const topSlots=hasPipeline?[
    {label:'Finding',boxCls:'is-finding',attrs:'data-finding="1" tabindex="0" role="button" aria-label="Scanner finding"'},
    {label:'Asset',station:byKey.asset,assetHint},
    {label:'Build',station:byKey.buildPipeline,pipelineHint:bpHint},
    {label:'Identity',station:byKey.identity},
    {label:'Runtime',station:byKey.runtime}
  ]:[
    {label:'Finding',boxCls:'is-finding',attrs:'data-finding="1" tabindex="0" role="button" aria-label="Scanner finding"'},
    {label:'Asset',station:byKey.asset},
    {label:'Identity',station:byKey.identity},
    {label:'Runtime',station:byKey.runtime}
  ];
  const botSlots=[
    {label:'Ownership',station:byKey.ownership},
    {label:'Threat intel',station:byKey.threat},
    {label:'Business context',station:byKey.business}
  ];

  const flowLines=[];
  for(let i=0;i<topXs.length-1;i++){
    const w0=topDims?topDims[i].w:CORR_BOX_W;
    const w1=topDims?topDims[i+1].w:CORR_BOX_W;
    flowLines.push(`<line class="corr-flow-line" x1="${topXs[i]+w0/2+6}" y1="${topY}" x2="${topXs[i+1]-w1/2-6}" y2="${topY}" marker-end="url(#corr-flow-${uid})"/>`);
  }

  const allPts=[
    ...topXs.map((x,i)=>({x,y:topY,w:topDims?topDims[i].w:CORR_BOX_W,h:topDims?topDims[i].h:CORR_BOX_H})),
    ...botXs.map(x=>({x,y:botY,w:CORR_BOX_W,h:CORR_BOX_H}))
  ];
  const spokes=allPts.map(pt=>{
    const hub=corrHubAnchor(cx,cy,CORR_HUB_R,pt.x,pt.y);
    const box=corrBoxAnchor(pt.x-pt.w/2,pt.y-pt.h/2,pt.w,pt.h,cx,cy);
    const isRuntime=pt.y===topY&&pt.x===topXs[topXs.length-1];
    const cls=isRuntime?'corr-spoke is-runtime':'corr-spoke';
    return `<path class="${cls}" d="${corrSpokePath(hub.x,hub.y,box.x,box.y)}" marker-end="url(#corr-spoke-${uid})"/>`;
  }).join('');

  const topBoxes=topSlots.map((slot,i)=>{
    const hint=slot.pipelineHint||slot.assetHint;
    const label=hint?.label||(slot.station?corrShortLabel(slot.station.name):slot.label);
    const boxCls=slot.station?stationBoxClass(slot.station):slot.boxCls;
    const attrs=slot.station
      ?`data-station-idx="${slot.station.idx}" tabindex="0" role="button" aria-label="${esc(slot.station.name)}${hint?.sub?' · '+hint.sub:''}"`
      :slot.attrs;
    let opts=topDims?{w:topDims[i].w,h:topDims[i].h,sub:hint?.sub||'',sub2:hint?.sub2||''}:{};
    if(assetHint&&i===1&&topDims) opts={...opts,h:Math.max(topDims[i].h,58)};
    return renderCorrBox(topXs[i],topY,label,boxCls,attrs,opts);
  }).join('');

  const botBoxes=botSlots.map((slot,i)=>{
    const st=slot.station;
    const label=st?corrShortLabel(st.name):slot.label;
    const boxCls=st?stationBoxClass(st):'';
    const attrs=st?`data-station-idx="${st.idx}" tabindex="0" role="button" aria-label="${esc(st.name)}"`:'';
    return renderCorrBox(botXs[i],botY,label,boxCls,attrs,{w:CORR_BOX_W,h:CORR_BOX_H});
  }).join('');

  const hubFo=`<foreignObject x="${cx-52}" y="${cy-52}" width="104" height="104">
    <div xmlns="http://www.w3.org/1999/xhtml" class="corr-hub-inner">
      <div class="corr-hub-label">Exposure</div>
      <div class="corr-hub-score">${e.score.toFixed(1)}</div>
      <div class="corr-hub-title">${esc(title)}</div>
      <div class="corr-hub-sub">${esc(e.id)}</div>
    </div>
  </foreignObject>`;

  return `<svg class="corr-graph" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" aria-label="${esc(attackPathSectionTitle(e.scannerId))} for ${esc(e.id)}">
    <defs>
      <marker id="corr-flow-${uid}" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="var(--correlation)"/></marker>
      <marker id="corr-spoke-${uid}" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--correlation)" opacity=".8"/></marker>
      <filter id="corr-glow-${uid}" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#2563eb" flood-opacity=".1"/></filter>
      <clipPath id="corr-hub-clip-${uid}"><circle cx="${cx}" cy="${cy}" r="${CORR_HUB_R-2}"/></clipPath>
    </defs>
    <g class="corr-spokes">${spokes}</g>
    <g filter="url(#corr-glow-${uid})">
      <circle cx="${cx}" cy="${cy}" r="${CORR_HUB_R}" fill="var(--panel)" stroke="var(--correlation)" stroke-width="2"/>
      <circle cx="${cx}" cy="${cy}" r="${CORR_HUB_R-8}" class="corr-hub-ring" stroke-width="1"/>
    </g>
    <g class="corr-flow">${flowLines.join('')}</g>
    <g class="corr-boxes">${topBoxes}${botBoxes}</g>
    <g clip-path="url(#corr-hub-clip-${uid})">${hubFo}</g>
  </svg>`;
}

function clamp(n,a,b){return Math.max(a,Math.min(b,n));}
function getSvgViewBoxWH(svg){
  const vb=(svg.getAttribute('viewBox')||'0 0 860 360').trim().split(/\s+/).map(Number);
  return {w:vb[2]||860,h:vb[3]||360};
}
function applySvgZoom(svg,scale){
  const {w,h}=getSvgViewBoxWH(svg);
  svg.style.width=(w*scale)+'px';
  svg.style.height=(h*scale)+'px';
  svg.style.maxWidth='none';
  svg.style.flex='none';
  svg.style.display='block';
}
function bindDiagramZoom(panel){
  panel.querySelectorAll('[data-zoom-controls]').forEach(controls=>{
    if(controls.dataset.bound==='1') return;
    const block=controls.closest('.corr-hub-main, .ap-hub-wrap');
    const canvas=block?.querySelector('[data-zoom-canvas]');
    const svg=canvas?.querySelector('svg.corr-graph, svg.attack-path-svg');
    if(!svg) return;
    controls.dataset.bound='1';
    const key='em-diagram-scale-'+(controls.dataset.zoomTarget||'correlation');
    let scale=1;
    try{scale=parseFloat(localStorage.getItem(key)||'1');}catch(e){}
    scale=clamp(scale,0.6,2.5);
    applySvgZoom(svg,scale);
    const setScale=(next)=>{
      scale=clamp(next,0.6,2.5);
      applySvgZoom(svg,scale);
      try{localStorage.setItem(key,String(scale));}catch(e){}
    };
    controls.querySelectorAll('button[data-zoom]').forEach(btn=>{
      btn.onclick=()=>{
        const dir=btn.dataset.zoom;
        setScale(scale + (dir==='in'?0.15:-0.15));
      };
    });
    controls.querySelector('[data-zoom-reset]')?.addEventListener('click',()=>setScale(1));
  });
}

function bindAttackPathResize(panel){
  const wrap=panel.querySelector('[data-ap-resize-wrap]');
  const handle=panel.querySelector('[data-ap-resize-handle]');
  if(!wrap||!handle||handle.dataset.bound==='1') return;
  handle.dataset.bound='1';
  const key='em-ap-graph-height';
  try{
    const h=parseInt(localStorage.getItem(key),10);
    if(h>=160&&h<=560) wrap.style.height=h+'px';
  }catch(e){}
  let startY=0,startH=0;
  const onMove=ev=>{
    const y=ev.clientY??ev.touches?.[0]?.clientY??startY;
    wrap.style.height=clamp(startH+(y-startY),160,560)+'px';
  };
  const onUp=()=>{
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
    handle.classList.remove('is-dragging');
    wrap.classList.remove('is-resizing');
    try{localStorage.setItem(key,String(wrap.offsetHeight));}catch(e){}
  };
  const onDown=ev=>{
    ev.preventDefault();
    startY=ev.clientY??ev.touches?.[0]?.clientY??0;
    startH=wrap.offsetHeight;
    handle.classList.add('is-dragging');
    wrap.classList.add('is-resizing');
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  };
  handle.addEventListener('mousedown',onDown);
  handle.addEventListener('keydown',ev=>{
    if(ev.key!=='ArrowUp'&&ev.key!=='ArrowDown') return;
    ev.preventDefault();
    const d=ev.key==='ArrowDown'?24:-24;
    wrap.style.height=clamp(wrap.offsetHeight+d,160,560)+'px';
    try{localStorage.setItem(key,String(wrap.offsetHeight));}catch(e){}
  });
}

/** Horizontal attack-path graph (lateral-movement style) per exposure. */

function pathHash(s){
  let h=0;
  for(let i=0;i<s.length;i++) h=((h<<5)-h+s.charCodeAt(i))|0;
  return Math.abs(h);
}

function shortHost(e){
  const h=e.host||e.asset;
  if(!h) return 'asset';
  return String(h).split('.')[0].slice(0,22);
}

function shortAsset(e){
  const a=String(e.asset);
  if(a.length<=28) return a;
  return a.slice(0,26)+'…';
}

function buildAttackPath(e){
  const h=pathHash(e.id);
  const meta=seedMeta(e);
  const host=shortHost(e);
  const crown=e.scannerId==='network'?'rds-payments-primary':e.scannerId==='sca'||e.scannerId==='container'?'cardholder-data-store':e.scannerId==='cspm'?'pci-audit-logs':e.scannerId==='secrets'?'prod-aws-account':'payments-ledger';
  const crownLabel=e.scannerId==='network'?'RDS payments':e.scannerId==='dast'?'Customer PII API':e.scannerId==='sast'?'Ledger DB':e.scannerId==='iac'?'PCI S3 bucket':e.scannerId==='easm'?'Shadow admin API':e.scannerId==='secrets'?'IAM admin plane':'Crown jewel';

  const mk=(id,type,icon,label,sub,stage,info,evidence)=>({id,type,icon,label,sub,stage,info,evidence});

  if(e.scannerId==='network'){
    const svc=`svc-${host.replace(/^pay-/,'').slice(0,10)}`;
    const nodes=[
      mk('ap0','entry','globe','Public Internet','0.0.0.0','Reconnaissance','Entry point for opportunistic and targeted scans against acmepay perimeter.',[`Scanner: ${e.tool}`,`${e.discovered} discovery`]),
      mk('ap1','exposed','server',host,meta.ip||'10.42.x.x','Initial Access',`Vulnerable host where ${e.cve||'finding'} was detected.`,[`${e.cve||e.title}`,`Plugin ${meta.plugin||'—'}`,`KEV: ${e.kev?'yes':'no'}`]),
      mk('ap2','actor','user',svc,`TENANT\\${svc}`,'Credential Access',`Service account running on ${host} — lateral movement pivot.`,[`Instance profile attached`,`${2+(h%3)} wildcards in policy`]),
      mk('ap3','group','shield','Domain Admins','AD security group','Privilege Escalation','Group membership path discovered via bloodhound-style graph.',[`'${svc}' effective admin path`,`Hop count: ${2+(h%2)}`]),
      mk('ap4','crown','database',crownLabel.split(' ')[0]||'RDS',meta.ip?.replace(/\d+$/,'200')||'10.10.10.200','Impact',`Tier-0 datastore reachable after host compromise.`,[`CMDB: ${meta.cmdb}`,`Tier 0 · PCI in scope`]),
      mk('ap5','exit','globe','Data exfiltration','HTTPS egress','Exfiltration','Outbound channel if attacker establishes C2 or bulk export.',[`DLP: ${e.internet?'alerting':'monitoring'}`,`NetFlow to external`])
    ];
    const narrative=`An attacker on the <strong>public internet</strong> can reach <strong>${esc(host)}</strong> by exploiting <strong>${esc(e.cve||e.title)}</strong>, harvest credentials for <strong>${esc(svc)}</strong>, escalate via privileged groups, and access <strong>${esc(crownLabel)}</strong> for data exfiltration over HTTPS.`;
    return {narrative, nodes, edges:edgeChain(nodes,['Scan / exploit','Control service','Member of','Lateral move','Query / export','HTTPS exfil']),findings:1+(e.crossLinks?.length||0)};
  }

  if(e.scannerId==='sca'){
    const repo=deriveRepo(e.asset);
    const svc=repo||shortAsset(e).split(':')[0];
    const img=e.assetDeploy||e.asset;
    const pkg=e.title.toLowerCase().includes('log4j')?'log4j-core 2.14.1'
      :e.title.includes('·')?e.title.split('·')[0].trim().slice(0,28)
      :'vulnerable dependency';
    const edgeHost=e.internet?`api.${DOMAIN}`:'internal-gateway.acmepay.internal';
    const entryPath=e.title.toLowerCase().includes('log4j')?'/api/v1/charge · JNDI':'HTTP entry · reachable';
    const nodes=[
      mk('ap0','entry','globe','Public Internet','0.0.0.0','Initial access','Attacker reaches the app from outside — not the supply-chain path where SCA found the dependency.',[`Internet-facing: ${e.internet?'yes':'no'}`,`EPSS ${(e.epss??0.9).toFixed(2)}`]),
      mk('ap1','exposed','globe',edgeHost,entryPath,'Exploit surface',`Internet-facing route to the service that loads ${pkg}.`,[`ALB / API gateway`,`${e.cve||e.title}`]),
      mk('ap2','actor','server',svc,e.internet?'prod pods':'runtime','Application',`Running service contains the vulnerable component (image ${img}).`,[`${e.buildPipeline?.deployment?.cluster||'eks-prod-use1'}`,`${e.buildPipeline?.deployment?.podCount||12} pods`]),
      mk('ap3','resource','package',pkg.split(' ')[0]||pkg,'Loaded in JVM','Component exploit',`${pkg} is loaded and invoked from an attacker-reachable path — where exploitation happens.`,[`Runtime SBOM match`,`Reachable: call graph`,`Introduced in ${ORG}/${repo} · see correlation map`]),
      mk('ap4','crown','database',crownLabel,'Tier 0','Impact',`Successful RCE or data access from compromised app tier.`,[`Jira ${e.jira||meta.jira}`,`KEV: ${e.kev?'listed':'—'}`]),
      mk('ap5','exit','globe','Data exfiltration','HTTPS egress','Exfiltration',`Outbound channel if attacker establishes shell or queries datastore.`,[`WAF ${e.internet?'may compensate':''}`,`Runtime sensor watch`])

    return {narrative, nodes, edges:edgeChain(nodes,['Probe / scan','HTTP request','Route to app','Trigger vuln lib','Access datastore','HTTPS exfil']),findings:1+(e.crossLinks?.length||0)};
  }

  if(e.scannerId==='sast'){
    const repo=deriveRepo(e.asset);
    const file=e.title.includes('·')?e.title.split('·').pop().trim():'src/.../handler.java';

      mk('ap3','resource','api','/api/v1/charge','payments-api','Exploit path',`HTTP entry invokes taint sink thousands of times per day.`,[`Taint: source → sink`,`~${2400+(h%800)} calls/day`]),
      mk('ap4','crown','database',crownLabel,'Tier 0','Impact',`Successful exploitation yields query or modify on ledger data.`,[`${e.jira||meta.jira}`,`Owner: ${e.owner}`]),

    const narrative=`An attacker on the <strong>internet</strong> can exploit <strong>${esc(e.title)}</strong> at <strong>${esc(path)}</strong> on <strong>${esc(url)}</strong>, pivot through the API tier, and access <strong>${esc(crownLabel)}</strong>.`;
    return {narrative, nodes, edges:edgeChain(nodes,['Probe','Exploit','Route','Backend call','Data access','WAF block']),findings:1+(e.crossLinks?.length||0)};
  }

  if(e.scannerId==='container'){
    const repo=deriveRepo(e.asset);
    const img=shortAsset(e);

function edgeChain(nodes,labels){
  const edges=[];
  for(let i=0;i<nodes.length-1;i++){
    edges.push({from:nodes[i].id,to:nodes[i+1].id,label:labels[i]||'Next'});
  }
  return edges;
}

function apNodeClass(type){
  if(type==='exposed') return 'ap-node-exposed';
  if(type==='crown') return 'ap-node-crown';
  if(type==='entry'||type==='exit') return 'ap-node-edge';
  return 'ap-node-mid';
}

function apHexPoints(cx,cy,r){
  const pts=[];
  for(let i=0;i<6;i++){
    const a=Math.PI/180*(60*i-30);
    pts.push(`${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`);
  }
  return pts.join(' ');
}

function renderAttackPathSvg(e,path){
  const nodes=path.nodes;
  const edges=path.edges;
  const gap=148;
  const r=34;
  const y=118;
  const stageY=52;
  const labelY=168;
  const W=Math.max(920,80+gap*(nodes.length-1)+80);
  const H=220;
  const uid=e.id.replace(/[^a-zA-Z0-9]/g,'');

  const positions={};
  nodes.forEach((n,i)=>{
    positions[n.id]={x:90+i*gap,y,cy:y};
  });

  const edgeSvg=edges.map(ed=>{
    const a=positions[ed.from],b=positions[ed.to];
    if(!a||!b) return '';
    const x1=a.x+r+8,x2=b.x-r-8;
    const mx=(x1+x2)/2;
    return `<g class="ap-edge">
      <line x1="${x1}" y1="${a.y}" x2="${x2}" y2="${b.y}" marker-end="url(#ap-arrow-${uid})"/>
      <text x="${mx}" y="${a.y-10}" class="ap-edge-label">${esc(ed.label)}</text>
    </g>`;
  }).join('');

  const nodeSvg=nodes.map(n=>{
    const p=positions[n.id];
    const cls=apNodeClass(n.type);
    const crown=n.type==='crown'?`<text x="${p.x}" y="${p.y-44}" class="ap-crown-mark" text-anchor="middle">♛</text>`:'';
    const stageLabel=n.stage?esc(n.stage.length>22?n.stage.slice(0,21)+'…':n.stage):'';
    const stageWarn=['Credential Access','Privilege Escalation','Exploitation','Identity'].some(s=>(n.stage||'').includes(s));
    const stage=n.stage?`<g class="ap-stage${stageWarn?' ap-stage-warn':''}"><rect x="${p.x-54}" y="${stageY}" width="108" height="20" rx="10"/><text x="${p.x}" y="${stageY+14}" text-anchor="middle">${stageLabel}</text></g>`:'';
    return `<g class="ap-node ${cls}" data-ap-node="${n.id}" tabindex="0" role="button" aria-label="${esc(n.label)}">
      ${stage}
      ${crown}
      <polygon points="${apHexPoints(p.x,p.y,r)}" class="ap-hex"/>
      <foreignObject x="${p.x-22}" y="${p.y-22}" width="44" height="44">
        <div xmlns="http://www.w3.org/1999/xhtml" class="ap-hex-icon">${icon(n.icon,22)}</div>
      </foreignObject>
      <text x="${p.x}" y="${labelY}" class="ap-node-label" text-anchor="middle">${esc(n.label)}</text>
      <text x="${p.x}" y="${labelY+14}" class="ap-node-sub" text-anchor="middle">${esc(n.sub||'')}</text>
    </g>`;
  }).join('');

  return `<svg class="attack-path-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" aria-label="Attack path for ${esc(e.id)}">
    <defs>
      <marker id="ap-arrow-${uid}" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/></marker>
    </defs>
    <g class="ap-edges">${edgeSvg}</g>
    <g class="ap-nodes">${nodeSvg}</g>
  </svg>`;
}

function bindAttackPathPanel(panel,e){
  const view=panel.querySelector('.attack-path-view');
  if(!view) return;
  const path=buildAttackPath(e);
  const infoEl=view.querySelector('[data-ap-info]');
  const selectNode=(nodeId)=>{
    const node=path.nodes.find(n=>n.id===nodeId);
    if(!node||!infoEl) return;
    view.querySelectorAll('.ap-node').forEach(g=>g.classList.toggle('selected',g.dataset.apNode===nodeId));
    infoEl.innerHTML=renderAttackPathNodeInfo(node);
  };
  view.querySelectorAll('.ap-node').forEach(g=>{
    const fn=()=>selectNode(g.dataset.apNode);
    g.onclick=fn;
    g.onkeydown=ev=>{if(ev.key==='Enter'||ev.key===' '){ev.preventDefault();fn();}};
  });
  if(path.nodes[1]) selectNode(path.nodes[1].id);
  view.querySelector('[data-findings-jump]')?.addEventListener('click',()=>{
    if(infoEl){
      infoEl.innerHTML=`
        <h5 class="ap-info-title">Scanner finding</h5>
        <p class="ap-info-desc">${esc(e.tool)} — ${esc(e.title)}</p>
        <div class="ap-info-evidence"><strong>Evidence</strong><ul>
          <li>${e.cve?esc(e.cve):`Severity: ${esc(e.severity)}`}</li>

      view.querySelectorAll('.ap-node').forEach(g=>g.classList.remove('selected'));

    hub?.scrollIntoView({behavior:'smooth',block:'nearest'});
    const finding=panel.querySelector('.corr-hub-wrap .corr-box-wrap[data-finding]');
    finding?.click();
  });
}

function aiChatReply(e, raw){
  const q=String(raw||'').toLowerCase().trim();
  const host=shortHost(e);
  const meta=seedMeta(e);
  const links=(e.crossLinks||[]).map(c=>`${c.id} (${c.by})`).join(', ');

  if(!q) return 'Type a question or pick a suggested prompt below.';

  if(/score|priorit|why.*high|severity|rank/.test(q)){
    return `Exposure <strong>${esc(e.id)}</strong> is <strong>${e.score.toFixed(1)}</strong> (${esc(e.severity)}) because correlation weighted ${e.kev ? '<strong>KEV</strong>, ' : ''}${e.internet ? '<strong>internet reachability</strong>, ' : ''}asset criticality, and ${esc(e.scoring.expr)}. ${e.kev ? 'CISA KEV listing pushes this above CVSS-only backlog items.' : 'Without KEV, reachability and business tier drive rank.'}`;
  }
  if(/attack path|lateral|movement|chain|step/.test(q)){
    const scaNote=e.scannerId==='sca'
      ? ' For SCA, the attack path is <strong>internet → app → loaded component → impact</strong>. Repo/CI/build is where the dependency was <em>introduced</em> — see the correlation map and origin asset, not this lateral path.'
      : '';
    return `The lateral path starts at the exposed entry (${esc(host)}), moves through identity and pivot points, and ends at a crown-jewel target. Click hex nodes in the attack path diagram for stage-specific evidence. ${e.cve ? `Root issue: <strong>${esc(e.cve)}</strong>.` : ''}${scaNote}`;
  }
  if(/fix|remediat|patch|mitigat|what should|first/.test(q)){
    const fix=e.status==='Patched' ? 'Rescan shows clean — maintain regression tests.'
      : e.status==='Compensating control' ? 'Virtual patch is active; schedule permanent fix in next change window.'
      : `Assign to <strong>${esc(e.owner)}</strong> (${esc(e.jira || meta.jira)}). Target SLA: ${esc(e.sla)}.`;
    return `Recommended order: (1) confirm exploitability in prod, (2) ${fix} (3) validate with ${esc(e.tool)} rescan. ${e.buildPipeline ? 'Rebuild and promote artifact via the linked CI/CD pipeline.' : ''}`;
  }
  if(/correlat|hub|station|asset|build|identity/.test(q)){
    return `The correlation map links the scanner <strong>finding</strong> to <strong>asset</strong>${e.buildPipeline ? ', <strong>build pipeline</strong>' : ''}, <strong>identity</strong>, <strong>runtime</strong>, plus ownership, threat intel, and business context. Click any box to see station-level detail below the hub.`;
  }
  if(e.crossLinks?.length && (/cross|related|also found/.test(q) || e.crossLinks.some(c=>q.includes(c.id.toLowerCase())))){
    return `Related exposures: <strong>${esc(links)}</strong>. These share the same payments platform storyline — triage as one incident to avoid duplicate work.`;
  }
  if(/blast|radius|impact|crown|data/.test(q)){
    return `Blast radius includes ${esc(host)} and downstream Tier-0 dependencies (payments data, PCI-scoped stores). Identity paths amplify impact if service accounts have broad IAM or AD membership.`;
  }
  if(/kev|epss|cve|exploit/.test(q)){
    return `${e.cve ? `<strong>${esc(e.cve)}</strong> — ` : ''}KEV: ${e.kev ? '<strong>listed</strong>' : 'not listed'}. EPSS: ${e.epss != null ? e.epss.toFixed(2) : 'n/a'}. CVSS: ${e.cvss != null ? e.cvss : 'n/a'}. ${e.kev ? 'Treat as imminent patching candidate.' : 'Prioritize by reachability and asset tier.'}`;
  }
  if(/lsa|secret|credential|password/.test(q)){
    return `LSA secrets and cached credentials let an attacker escalate from a single host compromise to domain-wide access. Rotate service accounts, restrict lateral RDP/SMB, and verify EDR coverage on the path nodes.`;
  }
  if(/owner|jira|ticket|sla/.test(q)){
    return `Owner: <strong>${esc(e.owner)}</strong>. Ticket: <strong>${esc(e.jira || meta.jira)}</strong>. SLA: ${esc(e.sla)}. Status: ${esc(e.status)}.`;
  }

  const sc=SCANNERS.find(x=>x.id===e.scannerId);
  return `For <strong>${esc(e.id)}</strong> (${esc(sc?.name || e.scannerName)}), I can explain scoring, the correlation map, attack path steps, remediation order, or related findings. Try: "Why is this exposure prioritized?" or "Explain the attack path."`;
}

function bindAiExplainChat(root, e){
  const dock=root?.matches?.('[data-ai-chat]')?root:root?.querySelector?.('[data-ai-chat]');
  if(!dock||dock.dataset.bound==='1') return;
  dock.dataset.bound='1';

  const fab=dock.querySelector('[data-ai-toggle]');
  const chatPanel=dock.querySelector('[data-ai-panel]');
  const messages=dock.querySelector('[data-ai-messages]');
  const form=dock.querySelector('[data-ai-form]');
  const input=dock.querySelector('[data-ai-input]');
  const closeBtn=dock.querySelector('[data-ai-close]');
  let seeded=false;

  const setOpen=(open)=>{
    chatPanel.hidden=!open;
    fab.setAttribute('aria-expanded',open?'true':'false');
    dock.classList.toggle('is-open',open);
    if(open&&!seeded){
      seeded=true;
      aiChatAppendMessage(messages,'assistant',aiChatInitialMessage(e));
    }
    if(open) setTimeout(()=>input?.focus(),80);
  };

  const sendUser=(text)=>{
    const t=String(text||'').trim();
    if(!t) return;
    aiChatAppendMessage(messages,'user',esc(t));
    const typing=aiChatShowTyping(messages);
    window.setTimeout(()=>{
      typing.remove();
      aiChatAppendMessage(messages,'assistant',aiChatReply(e,t));
    }, 520 + Math.min(t.length * 8, 400));
  };

  fab.onclick=(ev)=>{
    ev.preventDefault();
    ev.stopPropagation();
    setOpen(!dock.classList.contains('is-open'));
  };
  closeBtn?.addEventListener('click',(ev)=>{
    ev.preventDefault();
    ev.stopPropagation();
    setOpen(false);
  });
  form?.addEventListener('submit',ev=>{
    ev.preventDefault();
    const t=input.value;
    input.value='';
    sendUser(t);
  });
  dock.querySelectorAll('[data-ai-chip]').forEach(chip=>{
    chip.onclick=()=>{
      setOpen(true);
      sendUser(chip.textContent);
    };
  });

  document.querySelectorAll('[data-ai-open]').forEach(btn=>{
    btn.addEventListener('click',(ev)=>{
      ev.preventDefault();
      setOpen(true);
    });
  });
}

/** Remediation / patch suggestion panel (demo — no real patch integration). */

  const meta=seedMeta(e);

  const h=pathHash(e.id);

  if(e.scannerId==='sca'){
    const pkg=e.title.toLowerCase().includes('log4j')?'log4j-core':'dependency';
    const ver=e.title.toLowerCase().includes('log4j')?'2.14.1 → 2.17.2':'bump to fixed version';
    return {
      title:'Dependency patch',
      summary:`Upgrade ${pkg} in ${repo} and redeploy the production artifact.`,
      steps:[
        `Bump ${pkg} ${ver} in pom.xml / lockfile`,
        `Open auto-fix PR #${e.pr||(1240+(h%80))} → ${ORG}/${repo}`,
        e.buildPipeline?`Rebuild ${e.buildPipeline.artifact.version} · ${e.buildPipeline.build.system}`:'Run CI build + SBOM scan',
        `Promote to ${e.buildPipeline?.deployment?.cluster||'eks-prod-use1'} via ArgoCD`
      ],

      actionDetail:`Queues dependency bump PR and ${e.buildPipeline?'pipeline rebuild':'CI validation'}.`,
      auto:'Auto PR'

      action:'Apply patch',
      actionDetail:'Queues image rebuild and staged deploy (demo).',

    };
  }
  if(e.scannerId==='dast'){
    return {
      title:'App + edge fix',
      summary:`Close exploitable path on ${shortAsset(e)}.`,
      steps:[
        `Patch handler for ${e.title.slice(0,40)}`,
        `Deploy to ${e.internet?'prod':'staging'} after regression tests`,
        e.internet?'Enable WAF virtual patch until code ships':'Validate internal-only route',
        `Re-run ${e.tool} probe to confirm`
      ],
      action:'Apply patch',
      actionDetail:'Creates change ticket + optional WAF rule (demo).',

    };

  if(e.scannerId==='iac'){
    return {
      title:'IaC policy fix',
      summary:`Correct misconfiguration in Terraform before apply.`,
      steps:[
        `Update module per Checkov/tfsec suggestion`,
        `PR to ${ORG}/${repo||'infra'}`,
        `Plan/apply in prod-payments after approval`,
        `Drift scan confirms prod matches code`
      ],
      action:'Apply patch',
      actionDetail:'Opens PR with HCL fix snippet (demo).',
      auto:'Auto PR'
    };
  }
  if(e.scannerId==='cspm'){
    return {
      title:'Cloud posture fix',
      summary:`Remediate ${e.title.slice(0,50)} in AWS prod account.`,
      steps:[
        `Apply least-privilege / encryption policy`,
        `Run approved module or Lambda runbook`,
        `Validate attack path broken in CNAPP graph`,
        `Close ${meta.jira||e.jira} after rescan`
      ],
      action:'Apply patch',
      actionDetail:'Triggers posture auto-remediation runbook (demo).',
      auto:'Auto-fix'
    };
  }
  if(e.scannerId==='secrets'){
    return {

      summary:`Revoke leaked credential and rotate immediately.`,

function renderRemediationPanel(e){
  const r=buildRemediationSuggestion(e);
  const steps=r.steps.map(s=>`<li>${esc(s)}</li>`).join('');
  return `
    <aside class="corr-remediation-panel" data-remediation aria-label="Remediation suggestion">
      <div class="corr-remediation-head">
        ${icon('shield',16)}
        <span>Patch suggestion</span>
        <span class="corr-remediation-auto">${esc(r.auto)}</span>
      </div>
      <h6 class="corr-remediation-title">${esc(r.title)}</h6>
      <p class="corr-remediation-summary">${esc(r.summary)}</p>
      <ol class="corr-remediation-steps">${steps}</ol>
      <button type="button" class="corr-apply-patch-btn" data-apply-patch data-exp-id="${e.id}">
        ${icon('flow',14)}<span>${esc(r.action)}</span>
      </button>
      <p class="corr-remediation-status" data-patch-status hidden role="status"></p>
      <p class="corr-remediation-note">${esc(r.actionDetail)} Demo only — no changes applied.</p>
    </aside>`;
}

function bindRemediationPanel(panel,e){
  const btn=panel.querySelector('[data-apply-patch]');
  const status=panel.querySelector('[data-patch-status]');
  if(!btn||btn.dataset.bound==='1') return;
  btn.dataset.bound='1';
  const r=buildRemediationSuggestion(e);
  btn.addEventListener('click',()=>{
    if(btn.disabled) return;
    btn.disabled=true;
    btn.classList.add('is-busy');
    btn.querySelector('span').textContent='Queuing…';
    if(status){
      status.hidden=false;
      status.className='corr-remediation-status is-pending';
      status.textContent='Submitting patch request…';
    }
    window.setTimeout(()=>{
      btn.classList.remove('is-busy');
      btn.classList.add('is-done');
      btn.querySelector('span').textContent='Patch queued';
      if(status){
        status.className='corr-remediation-status is-success';
        status.innerHTML=`<strong>${esc(e.id)}</strong> · ${esc(r.title)} queued for ${esc(e.owner)} · ${esc(e.jira||seedMeta(e).jira)}`;
      }
    },900);
  });
}

/** Full-page correlation map & attack path for a single exposure. */

let diagramExpId=null;
let diagramView='correlation';

function initDiagramFromUrl(){
  const params=new URLSearchParams(location.search);
  const fromUrl=params.get('scanner');
  let p=fromUrl;
  if(!p){try{p=sessionStorage.getItem('em-active-scanner');}catch(e){}}
  if(p){
    const i=SCANNERS.findIndex(s=>s.id===p);
    if(i>=0) activeScanner=i;
  }
  diagramExpId=params.get('exp');
  const v=params.get('view');
  if(v==='attack'||v==='correlation'||v==='mobilization') diagramView=v;
}

function syncDiagramNavLinks(exp){
  persistScanner();
  const back=document.getElementById('diagramBackLink');
  if(back){
    back.setAttribute('href',triageBackLink(exp?.id));
    back.textContent=exp?'← Back to '+exp.id:'← Back to triage';
  }
  const side=document.getElementById('triageSidebarLink');
  if(side) side.setAttribute('href',triageBackLink(exp?.id));
}

function renderDiagramPage(){
  const host=document.getElementById('diagramPageHost');
  if(!host) return;
  const exp=ALL_EXPOSURES.find(x=>x.id===diagramExpId);
  if(!exp){
    host.innerHTML='<div class="diagram-empty">Exposure not found. <a href="'+triageBackLink()+'">Return to triage queue</a></div>';
    syncDiagramNavLinks(null);
    renderSidebar();
    return;
  }
  const si=SCANNERS.findIndex(s=>s.id===exp.scannerId);
  if(si>=0) activeScanner=si;
  document.documentElement.style.setProperty('--accent',SCANNERS[activeScanner].accent);
  syncDiagramNavLinks(exp);
  renderSidebar();
  document.querySelectorAll('.scanner-list [data-i]').forEach(btn=>{
    btn.onclick=()=>{
      activeScanner=+btn.dataset.i;
      persistScanner();
      location.href='exposure-dashboard.html'+scannerQuery();
    };
  });
  const meta=document.getElementById('diagramExpMeta');
  if(meta){
    meta.innerHTML=`<span class="diagram-exp-id">${esc(exp.id)}</span><span class="diagram-exp-title">${esc(exp.title)}</span><span class="score-badge ${exp.severityClass}">${exp.score.toFixed(1)}</span>`;
  }
  const sub=document.getElementById('diagramPageSub');
  if(sub) sub.textContent=SCANNERS[activeScanner].name+' · '+exp.severity+' · '+exp.owner;
  host.innerHTML=renderDiagramPanelHtml(exp);
  const panel=host.querySelector('.corr-panel');
  if(panel) bindCorrelationPanel(panel,exp.stations,exp,diagramView);
  const chatHost=document.getElementById('aiChatHost');
  if(chatHost){
    chatHost.innerHTML=renderAiExplainChat(exp);
    bindAiExplainChat(chatHost,exp);
  }
}

initDiagramFromUrl();
renderDiagramPage();

</script>

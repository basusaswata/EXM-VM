<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Exposure Management · Analyst Dashboard</title>
<style>
:root {
  --bg: #f7f8fb; --panel: #fff; --panel-2: #f1f4f8; --panel-3: #e8ecf4;
  --text: #111827; --muted: #5b6575; --muted-2: #8892a3; --border: #d9dee8;
  --accent: #2563eb; --sidebar: #fff;
  --correlation: #2563eb; --correlation-soft: #dbeafe;
  --scoring: #7c3aed; --scoring-soft: #ede9fe;
  --outcome: #059669; --outcome-soft: #d1fae5;
  --kev: #dc2626; --kev-soft: #fee2e2;
  --crit: #dc2626; --crit-soft: #fee2e2;
  --high: #ea580c; --high-soft: #ffedd5;
  --med: #ca8a04; --med-soft: #fef9c3;
  --low: #64748b; --low-soft: #f1f5f9;
}
[data-theme="dark"] {
  --bg: #0b1020; --panel: #111827; --panel-2: #172033; --panel-3: #1f2a40;
  --text: #f8fafc; --muted: #a9b3c5; --muted-2: #8895ab; --border: #263247;
  --correlation-soft: #16284f; --scoring-soft: #2a1b49; --outcome-soft: #0f372c;
  --sidebar: #0f172a; --crit-soft: #401919; --high-soft: #4a2a10; --med-soft: #3d2e08; --low-soft: #1f2937;
  --kev-soft: #4a1919;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, sans-serif; color: var(--text); background: var(--bg); overflow: hidden; }
.app { display: flex; width: 100vw; height: 100vh; }
.sidebar { width: 232px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 14px 10px; display: flex; flex-direction: column; gap: 10px; }
.brand { padding: 8px 10px 12px; border-bottom: 1px solid var(--border); }
.brand h1 { margin: 0; font-size: 16px; font-weight: 800; }
.sibling-link { font-size: 10px; color: var(--muted); text-decoration: none; font-weight: 600; }
.sibling-link:hover { color: var(--accent); }
.scanner-list { display: flex; flex-direction: column; gap: 6px; overflow: auto; flex: 1; }
.scanner-btn { width: 100%; border: 1px solid transparent; background: transparent; color: var(--text); display: grid; grid-template-columns: 26px 1fr; gap: 8px; align-items: center; text-align: left; border-radius: 10px; padding: 8px; cursor: pointer; transition: background .15s; }
.scanner-btn:hover { background: var(--panel-2); }
.scanner-btn.active { background: color-mix(in srgb, var(--accent) 13%, transparent); border-color: color-mix(in srgb, var(--accent) 35%, var(--border)); }
.scanner-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.scanner-icon { width: 24px; height: 24px; display: grid; place-items: center; border-radius: 8px; }
.scanner-title { font-size: 12px; font-weight: 720; line-height: 1.18; display: block; }
.scanner-sub { font-size: 10px; color: var(--muted); margin-top: 2px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sidebar-footer { margin-top: auto; }
.theme-toggle { width: 100%; border: 1px solid var(--border); background: var(--panel-2); color: var(--text); border-radius: 10px; padding: 9px 10px; cursor: pointer; font-size: 12px; font-weight: 700; }
.theme-toggle:hover { background: var(--panel-3); }
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.disclaimer { font-size: 11px; font-weight: 700; padding: 8px 18px; background: color-mix(in srgb, #ea580c 12%, var(--panel)); border-bottom: 1px solid var(--border); line-height: 1.4; }
.topbar { padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--panel); }
.topbar h2 { margin: 0; font-size: 17px; font-weight: 800; }
.topbar p { margin: 4px 0 0; font-size: 12px; color: var(--muted); }
.filter-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 12px; padding: 10px 18px; background: var(--panel); border-bottom: 1px solid var(--border); }
#searchInput { flex: 1 1 200px; min-width: 180px; max-width: 320px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 12px; background: var(--panel-2); color: var(--text); }
#searchInput:focus { outline: 2px solid var(--accent); outline-offset: 0; }
.filter-chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; flex: 1 1 100%; }
.chip-group { display: inline-flex; flex-wrap: wrap; gap: 4px; align-items: center; font-size: 9px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-right: 4px; }
.chip { font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 999px; border: 1px solid var(--border); background: var(--panel-2); color: var(--muted); cursor: pointer; }
.chip.on { background: color-mix(in srgb, var(--accent) 14%, var(--panel)); color: var(--accent); border-color: var(--accent); }
.chip.clear { color: var(--text); }
.summary-line { font-size: 11px; color: var(--muted); font-weight: 600; margin-left: auto; white-space: nowrap; }
.list-head {
  display: grid; grid-template-columns: 52px 1.4fr 1fr 48px 1fr 110px 72px 28px; gap: 10px;
  padding: 6px 18px; font-size: 9px; font-weight: 800; text-transform: uppercase;
  letter-spacing: .08em; color: var(--muted-2); background: var(--panel); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 2;
}
.list-scroll { flex: 1; overflow: auto; background: var(--bg); }
.exp-wrap { border-bottom: 1px solid var(--border); transition: background .2s; }
.exp-wrap.open { background: var(--panel); }
.exp-row { display: grid; grid-template-columns: 52px 1.4fr 1fr 48px 1fr 110px 72px 28px; gap: 10px; align-items: center; padding: 0 18px; min-height: 48px; cursor: pointer; transition: background .15s; }
.exp-row:hover, .exp-row.focused { background: var(--panel-2); }
.exp-wrap.open .exp-row { background: color-mix(in srgb, var(--accent) 6%, var(--panel)); }
.score-badge { font-size: 13px; font-weight: 850; font-variant-numeric: tabular-nums; padding: 4px 8px; border-radius: 8px; text-align: center; line-height: 1.2; }
.sev-critical { background: var(--crit-soft); color: var(--crit); }
.sev-high { background: var(--high-soft); color: var(--high); }
.sev-medium { background: var(--med-soft); color: var(--med); }
.sev-low { background: var(--low-soft); color: var(--low); }
.col-title { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.col-asset { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.col-asset-origin { color: var(--text); font-weight: 650; }
.col-asset-arrow { color: var(--muted); font-weight: 400; margin: 0 2px; }
.col-asset-deploy { color: var(--accent); font-weight: 750; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 10px; }
.asset-dual-hint { font-size: 11px; color: var(--muted); margin: 0 0 10px; line-height: 1.45; }
.asset-dual-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.asset-dual-grid-compact { gap: 8px; }
@media (max-width: 900px) { .asset-dual-grid { grid-template-columns: 1fr; } }
.asset-dual-col { padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--panel-2); }
.asset-dual-origin { border-left: 3px solid var(--git, var(--accent)); }
.asset-dual-deploy { border-left: 3px solid var(--correlation); }
.asset-dual-section { font-size: 9px; font-weight: 850; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 6px; }
.asset-dual-card { grid-column: span 2; }
.corr-box-sub.corr-box-origin-line { color: var(--text); }
.corr-box-sub2.corr-box-deploy-line { color: var(--correlation); }
.kev-pill { font-size: 8px; font-weight: 900; background: var(--kev); color: #fff; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
.col-owner { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.status-pill { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 999px; border: 1px solid var(--border); color: var(--text); background: var(--panel); }
.status-open { border-color: var(--accent); color: var(--accent); }
.status-in-progress { border-color: var(--med); }
.status-compensating-control { border-color: var(--high); }
.status-patched { border-color: var(--outcome); color: var(--outcome); }
.status-risk-accepted { border-color: var(--med); background: var(--med-soft); }
.col-sla { font-size: 10px; font-weight: 700; color: var(--muted); font-variant-numeric: tabular-nums; }
.sla-overdue { color: var(--crit); }
.sla-urgent { color: var(--high); }
.col-chev { color: var(--muted-2); display: flex; justify-content: center; transition: transform .2s; }
.exp-wrap.open .col-chev { transform: rotate(90deg); color: var(--accent); }
.detail-panel { padding: 16px 18px 20px; border-top: 1px solid var(--border); animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
.detail-head { display: grid; grid-template-columns: 1fr auto 32px; gap: 16px; align-items: start; margin-bottom: 16px; }
.detail-title { font-size: 16px; font-weight: 800; }
.detail-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
.detail-score { font-size: 32px; font-weight: 900; font-variant-numeric: tabular-nums; line-height: 1; text-align: right; }
.detail-expr { font-size: 10px; color: var(--muted); margin-top: 6px; max-width: 280px; text-align: right; font-family: ui-monospace, monospace; }
.detail-close { border: 1px solid var(--border); background: var(--panel-2); border-radius: 8px; width: 28px; height: 28px; font-size: 18px; cursor: pointer; color: var(--text); }
.cross-links { font-size: 11px; margin-top: 8px; color: var(--muted); }
.cross-links-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-top: 10px; }
.cross-links-label { font-size: 10px; font-weight: 850; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-right: 4px; }
.cross-link-btn { display: inline-flex; align-items: center; gap: 6px; flex-wrap: wrap; border: 1px solid var(--border); background: var(--panel-2); border-radius: 10px; padding: 6px 10px; cursor: pointer; font-size: 11px; color: var(--text); text-align: left; max-width: 100%; }
.cross-link-btn:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(37,99,235,.08); }
.cross-link-btn .cross-id { font-weight: 900; color: var(--accent); font-variant-numeric: tabular-nums; }
.cross-link-btn .cross-by { font-weight: 700; color: var(--muted); }
.cross-link-btn .cross-desc { color: var(--text); flex: 1 1 100%; font-size: 10px; line-height: 1.35; }
.link-btn { border: none; background: none; color: var(--accent); font-weight: 700; cursor: pointer; padding: 0; font-size: inherit; }
.detail-section { margin-top: 14px; }
.detail-section h4 { margin: 0 0 10px; font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); font-weight: 850; }
.corr-section-head { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
.corr-section-head h4 { margin: 0; }
.corr-view-toggle { display: inline-flex; gap: 4px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 2px; }
.corr-view-btn { border: none; background: transparent; color: var(--muted); font-size: 10px; font-weight: 800; padding: 5px 10px; border-radius: 6px; cursor: pointer; }
.corr-view-btn.on { background: var(--panel); color: var(--accent); box-shadow: 0 1px 2px rgba(0,0,0,.06); }
.corr-graph-wrap { position: relative; background: linear-gradient(165deg, var(--panel-2) 0%, var(--panel) 55%, var(--panel-2) 100%); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px 14px; overflow: auto; }
.corr-graph { width: 100%; max-width: 1120px; min-width: 720px; height: auto; display: block; margin: 0 auto; }

.diagram-zoom-controls {
  position: absolute; top: 10px; right: 10px;
  display: flex; gap: 6px; align-items: center; z-index: 3;
  background: color-mix(in srgb, var(--panel) 85%, transparent);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 4px 6px;
}
.diagram-zoom-controls button {
  border: 1px solid var(--border);
  background: var(--panel-2);
  color: var(--text);
  border-radius: 8px;
  font-weight: 900;
  cursor: pointer;
  width: 30px; height: 26px;
  display: inline-flex; align-items: center; justify-content: center;
  line-height: 1;
}
.diagram-zoom-controls button[data-zoom-reset] {
  width: auto; padding: 0 10px; font-size: 10px; font-weight: 850;
}
.diagram-zoom-controls button:hover { border-color: var(--accent); }
.diagram-zoom-canvas { position: relative; }
.corr-flow-line { fill: none; stroke: var(--correlation); stroke-width: 2; opacity: .85; }
.corr-spoke { fill: none; stroke: var(--correlation); stroke-width: 1.75; opacity: .55; pointer-events: none; }
.corr-spoke.is-runtime { stroke: #0d9488; opacity: .7; }
.corr-box-wrap { cursor: pointer; outline: none; }
.corr-box-wrap:focus-visible .corr-box { box-shadow: 0 0 0 2px var(--accent), 0 4px 12px rgba(37,99,235,.15); }
.corr-box-wrap.selected .corr-box { box-shadow: 0 0 0 2px var(--accent), 0 5px 14px rgba(37,99,235,.16); }
.corr-box { height: 100%; width: 100%; min-width: 0; box-sizing: border-box; display: flex; align-items: center; justify-content: center; padding: 8px 10px; border-radius: 10px; border: 1.5px solid var(--correlation); background: var(--correlation-soft); font-family: Inter, ui-sans-serif, system-ui, sans-serif; transition: box-shadow .2s, filter .15s; box-shadow: 0 2px 6px rgba(15,23,42,.06); }
.corr-box.has-sub { flex-direction: column; align-items: center; justify-content: center; gap: 2px; padding: 6px 8px; }
.corr-box.has-sub .corr-box-label { font-size: 9px; }
.corr-box-wrap:hover .corr-box { filter: brightness(1.03); }
.corr-box.is-finding { border-color: var(--muted); background: var(--panel); }
.corr-box.is-runtime { border-color: #0d9488; background: #ecfdf5; }
[data-theme="dark"] .corr-box.is-runtime { background: #0f2a22; }
.corr-box.is-pipeline { border-color: color-mix(in srgb, var(--accent) 55%, var(--correlation)); background: color-mix(in srgb, var(--accent) 10%, var(--correlation-soft)); }
.corr-box.is-pipeline .corr-box-label { color: var(--accent); }
.corr-box-label { font-size: 10px; font-weight: 850; line-height: 1.2; color: var(--correlation); text-align: center; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; width: 100%; }
.corr-box-sub { font-size: 9px; font-weight: 800; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--text); line-height: 1.2; text-align: center; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.corr-box-sub2 { font-size: 8px; font-weight: 650; line-height: 1.2; color: var(--muted); text-align: center; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.corr-box.is-pipeline .corr-box-sub { color: var(--accent); }
.corr-box.is-finding .corr-box-label { color: var(--text); }
.corr-box.is-runtime .corr-box-label { color: #0d9488; }
.corr-hub-ring { fill: none; stroke: var(--correlation); opacity: .22; }
.corr-hub-inner { width: 100%; height: 100%; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 6px 8px; gap: 2px; overflow: hidden; border-radius: 50%; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
.corr-hub-inner .corr-hub-label { font-size: 7px; font-weight: 800; color: var(--correlation); letter-spacing: .14em; text-transform: uppercase; line-height: 1.2; }
.corr-hub-inner .corr-hub-score { font-size: 17px; font-weight: 900; color: var(--correlation); line-height: 1.1; }
.corr-hub-inner .corr-hub-title { font-size: 8.5px; font-weight: 750; color: var(--text); line-height: 1.25; max-width: 100%; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.corr-hub-inner .corr-hub-sub { font-size: 7px; color: var(--muted); line-height: 1.2; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.corr-node-detail { margin-top: 10px; padding: 10px 12px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; min-height: 48px; }
.corr-cards-panel { margin-top: 10px; }
.station-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.station-grid-extended { grid-template-columns: repeat(4, 1fr); }
@media (max-width: 1200px) { .station-grid-extended { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 1100px) { .station-grid { grid-template-columns: repeat(2, 1fr); } }
.station-card.bp-wide { grid-column: span 2; }
.bp-pipeline-card { border-color: color-mix(in srgb, var(--accent) 40%, var(--border)); background: color-mix(in srgb, var(--accent) 6%, var(--correlation-soft)); }
.bp-flow { margin-top: 4px; }
.bp-stage { display: flex; gap: 10px; align-items: flex-start; }
.bp-stage-rail { display: flex; flex-direction: column; align-items: center; width: 22px; flex-shrink: 0; }
.bp-connector { width: 2px; flex: 1; min-height: 10px; background: color-mix(in srgb, var(--accent) 35%, var(--border)); margin-bottom: 2px; }
.bp-dot { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; background: var(--panel); border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--border)); color: var(--accent); }
.bp-stage-body { flex: 1; min-width: 0; padding-bottom: 10px; }
.bp-stage-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 3px; }
.bp-stage-title { font-size: 10px; font-weight: 850; text-transform: uppercase; letter-spacing: .06em; color: var(--correlation); }
.bp-mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 10px; line-height: 1.45; color: var(--text); word-break: break-word; }
.bp-pill { font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 999px; white-space: nowrap; }
.bp-pill.bp-ok { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
.bp-pill.bp-warn { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; }
.bp-pill.bp-bad { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
.bp-pill.bp-neutral { background: var(--panel-2); color: var(--muted); border: 1px solid var(--border); }
[data-theme="dark"] .bp-pill.bp-ok { background: #14532d; color: #86efac; border-color: #166534; }
[data-theme="dark"] .bp-pill.bp-warn { background: #422006; color: #fde047; border-color: #854d0e; }
[data-theme="dark"] .bp-pill.bp-bad { background: #450a0a; color: #fca5a5; border-color: #991b1b; }
.bp-extra { margin-top: 10px; padding-top: 10px; border-top: 1px dashed color-mix(in srgb, var(--accent) 25%, var(--border)); }
.bp-extra-label { font-size: 9px; font-weight: 850; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 6px; }
.bp-chain { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; margin-bottom: 6px; }
.bp-chain-link { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 6px; background: var(--panel); border: 1px solid var(--border); cursor: default; }
.bp-chain-link.bp-chain-vuln { border-color: var(--crit); background: var(--crit-soft); color: var(--crit); }
.bp-chain-sep { color: var(--muted); font-size: 11px; font-weight: 700; }
.bp-detail-wrap .bp-pipeline-card { border: none; background: transparent; padding: 0; }
.bp-detail-wrap .bp-wide { grid-column: auto; }
.station-card { background: var(--correlation-soft); border: 1px solid color-mix(in srgb, var(--correlation) 35%, var(--border)); border-radius: 12px; padding: 10px 12px; }
.station-card.scm-station { border-color: color-mix(in srgb, var(--accent) 45%, var(--border)); background: color-mix(in srgb, var(--accent) 8%, var(--correlation-soft)); }
.station-card.scm-station .station-head { color: var(--accent); }
.col-scm { font-size: 10px; color: var(--muted); display: block; margin-top: 1px; }
.station-head { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 800; color: var(--correlation); margin-bottom: 6px; }
.station-line { font-size: 10px; line-height: 1.45; color: var(--text); margin-top: 3px; }
.formula-chain { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.score-pill { background: var(--scoring-soft); border: 1px solid color-mix(in srgb, var(--scoring) 40%, var(--border)); color: var(--scoring); font-size: 11px; font-weight: 700; padding: 6px 10px; border-radius: 10px; }
.formula-eq { font-size: 14px; font-weight: 900; color: var(--scoring); }
.outcome-row { display: flex; flex-wrap: wrap; gap: 10px; }
.outcome-card { flex: 1 1 200px; background: var(--outcome-soft); border: 1px solid color-mix(in srgb, var(--outcome) 35%, var(--border)); border-radius: 12px; padding: 10px 12px; }
.outcome-type { font-size: 12px; font-weight: 800; color: var(--outcome); }
.outcome-dest { font-size: 11px; color: var(--accent); font-weight: 700; text-decoration: none; display: block; margin-top: 4px; }
.outcome-meta { font-size: 10px; color: var(--muted); margin-top: 6px; }
.auto-pill { font-weight: 800; color: var(--text); }
.timeline { border-left: 2px solid var(--border); margin-left: 8px; padding-left: 16px; }
.tl-item { position: relative; margin-bottom: 12px; font-size: 11px; }

function bpAge(h){return h<24?`${h}h ago`:`${Math.floor(h/24)} day${Math.floor(h/24)>1?'s':''} ago`;}
function bpRepoName(asset){return asset.includes(':')?asset.split(':')[0]:asset.replace(/\s*\(.*\)/,'').trim();}

const BP_BUILD_ENVS=[
  {environment:'production',envKey:'prod',envLabel:'Production CI',agentPool:'k8s-build-agents-prod-us-east-1',region:'us-east-1'},
  {environment:'staging',envKey:'staging',envLabel:'Staging CI',agentPool:'k8s-build-agents-stg-us-east-1',region:'us-east-1'},
  {environment:'development',envKey:'dev',envLabel:'Development CI',agentPool:'github-hosted · ubuntu-22.04',region:'us-west-2'}
];

function bpApplyBuildEnv(build,n){
  const env=BP_BUILD_ENVS[n%BP_BUILD_ENVS.length];
  return {...build,...env};
}

function bpBuildEnvLine(b){
  if(!b) return '';
  return `${b.envLabel||b.environment} · ${b.system} · ${b.agentPool||'default agents'}${b.region?` · ${b.region}`:''}`;
}

function bpBuildGraphHint(bp){
  if(!bp?.build) return {label:'Build',sub:'',sub2:''};
  const b=bp.build;
  const env=String(b.envLabel||b.environment||'').replace('Production','Prod').replace('Staging','Stg').replace('Development','Dev');
  const sys=String(b.system||'').replace('GitHub Actions','GHA').replace('Azure Pipelines','Azure CI').replace('GitLab CI','GitLab');
  return {label:'Build',sub:b.buildId,sub2:`${env} · ${sys}`.trim()};
}

function buildBuildPipeline(seed,sid){
  if(!PIPELINE_SCANNERS.has(sid)) return null;
  if(PIPELINE_PRESETS[seed.id]) return {...PIPELINE_PRESETS[seed.id]};
  const n=seed.id.charCodeAt(4)+seed.id.charCodeAt(5);
  const repo=bpRepoName(seed.asset);
  const orgRepo=`acme-payments/${repo}`.replace(/\/+/g,'/');
  const authors=['Sarah Chen','Marcus Webb','Priya Nair','James Okonkwo'];
  const systems=['Jenkins','GitHub Actions','GitLab CI','CircleCI','Azure Pipelines'];
  const prStates=['merged','merged','precaught','blocked'];
  const prState=prStates[n%4];
  const base={
    repo:{name:orgRepo,branch:'main',commitShort:(n*17%0xffff).toString(16).slice(0,7),author:authors[n%4],ageHours:48+(n%96)},
    prStatus:{state:prState,prNumber:1100+(n%200),prUrl:'#',detail:prState==='merged'?'Security gate passed at merge':prState==='precaught'?'Fixed in follow-up PR before merge':'Blocked at PR — override for hotfix'},
    build:bpApplyBuildEnv({system:systems[n%5],buildId:`build-${4000+n}`,buildUrl:'#',ageHours:36+(n%48),status:n%7===0?'failed':'passed',note:'Pipeline scan completed'},n),
    artifact:{name:sid==='container'?`registry.internal/${repo}`:`${repo}`,version:sid==='container'?`${repo}:v${4+(n%3)}.${n%10}`:`v2.${n%9}.0`,digest:`sha256:${(n*991).toString(16).slice(0,4)}…`,registry:'JFrog Artifactory'},
    registry:{name:'JFrog Artifactory',path:'prod-releases',scanStatus:'digest on file'},
    deployment:{tool:'ArgoCD',app:`${repo.replace(/[^a-z0-9-]/gi,'-')}-prod`,cluster:'eks-prod-us-east-1',namespace:seed.owner.split(' ')[0].toLowerCase(),podCount:4+(n%20),syncedAgo:bpAge(36+(n%48))}
  };
  if(sid==='sca'){
    base.reachability={confirmed:seed.score>=7,callsPerDay:seed.score>=7?'1,200×/day':'Not loaded at runtime',entryPoint:seed.internet?'Inbound API traffic':'Internal batch only',sensor:'Runtime SBOM sensor'};
    base.dependencyChain=[repo,'spring-boot-starter-web','spring-core',seed.cve?seed.cve.replace('CVE-','lib-'):'vuln-lib'];
    base.manifestFile=n%2?'pom.xml':'package-lock.json';
    base.resolvedVersion=`${2+(n%3)}.${10+(n%5)}.${n%10}`;
  }
  if(sid==='sast'){
    base.reachability={confirmed:seed.score>=7.5,callsPerDay:seed.score>=7.5?'Called from prod entry':'Dead code path — never invoked',entryPoint:seed.internet?'/api public routes':'Internal admin only',sensor:'IAST + APM traces'};
  }
  if(sid==='container'){
    base.baseImageLineage=[
      {name:`${repo}:v4.${n%3}`,layer:'app'},
      {name:'internal-base/java17:2024-01',layer:'intermediate'},
      {name:'eclipse-temurin:17-jre',layer:'base'},
      {name:'ubuntu:22.04',layer:'os'}
    ];
    base.vulnerableLayer=n%5===0?'os':n%3===0?'base':'app';
    base.note='Image built from application repo Dockerfile';
  }
  return base;
}


function bpPill(state){
  const m={
    merged:{cls:'bp-ok',label:'Merged'},
    precaught:{cls:'bp-warn',label:'Pre-PR catch'},
    blocked:{cls:'bp-bad',label:'Blocked at PR'},
    passed:{cls:'bp-ok',label:'✓ Passed'},
    failed:{cls:'bp-bad',label:'✗ Failed'}
  };
  const x=m[state]||{cls:'bp-neutral',label:state};
  return `<span class="bp-pill ${x.cls}">${esc(x.label)}</span>`;
}

function renderBpChain(bp,sid){

  }
  if(sid==='container'&&bp.baseImageLineage){
    const links=bp.baseImageLineage.map(row=>{
      const vuln=row.layer===bp.vulnerableLayer;

    }).join('<span class="bp-chain-sep">›</span>');

function renderBuildPipelineCard(e){

    {icon:'package',title:'Artifact',mono:`${bp.artifact.name}${bp.artifact.version?':'+bp.artifact.version:''} · ${bp.artifact.registry} · digest ${bp.artifact.digest}`,pill:null},
    {icon:'container',title:'Registry / artifact store',mono:`${bp.registry.name} · ${bp.registry.path} · ${bp.registry.scanStatus}`,pill:null},
    {icon:'cloud',title:'Deployment trail',mono:`${bp.deployment.tool} ${bp.deployment.app} → ${bp.deployment.cluster} ns ${bp.deployment.namespace} · ${bp.deployment.podCount} pods · ${bp.deployment.syncedAgo}`,pill:null}

  }
  const flow=stages.map((st,i)=>`

  return `<div class="station-card bp-wide bp-pipeline-card" data-pipeline-card>
    <div class="station-head">${icon('container',14)}<span>Build Pipeline</span></div>
    <div class="bp-flow">${flow}</div>

  </div>`;
}

function renderBuildPipelineDetail(e){
  return renderBuildPipelineCard(e).replace('data-pipeline-card','');
}

function renderStationCards(e){
  const parts=[];
  e.stations.forEach(s=>{
    if(s.k==='buildPipeline') return;
    if(s.k==='asset'&&e.buildPipeline){
      parts.push(`<div class="station-card ${s.scm?'scm-station':''}"><div class="station-head">${icon(s.icon,14)}<span>${esc(s.name)}</span></div>${s.lines.map(l=>`<div class="station-line">${esc(l)}</div>`).join('')}</div>`);
      parts.push(renderBuildPipelineCard(e));

    }
    parts.push(`<div class="station-card ${s.scm?'scm-station':''} ${s.k==='runtime'?'runtime-station':''}"><div class="station-head">${icon(s.icon,14)}<span>${esc(s.name)}</span></div>${s.lines.map(l=>`<div class="station-line">${esc(l)}</div>`).join('')}</div>`);
  });
  return `<div class="station-grid station-grid-extended">${parts.join('')}</div>`;
}

function stationCountLabel(e){
  const n=e.stations.filter(s=>s.k!=='buildPipeline').length+(e.buildPipeline?1:0);
  return `${n} sources`;
}

function seedMeta(seed){
  const n=(seed.id.charCodeAt(4)||48)*19+(seed.id.charCodeAt(5)||48);
  const oct3=18+(n%200), oct4=7+(n%240);
  const slug=String(seed.asset).replace(/:.*$/,'').replace(/\..*$/,'').replace(/[^a-z0-9-]+/gi,'-').slice(0,24);
  return {
    ip: seed.ip || `10.42.${oct3}.${oct4}`,
    host: seed.host || (/\./.test(seed.asset)?seed.asset:`${slug}.use1.${DOMAIN}`),
    jira: seed.jira || `PAY-${4200+(n%900)}`,
    epss: seed.epss ?? (seed.kev?0.91+((n%8)/100):0.08+((n%72)/100)),
    cvss: seed.cvss ?? (seed.score>=9?9.8:seed.score>=7?7.4:5.1),
    discovered: seed.discovered || `${4+(n%48)}h ago`,
    cmdb: seed.cmdb || `cmdb:service/${10000+n}`,
    qid: seed.qid || `QID-${379000+(n%999)}`,
    plugin: seed.plugin || `Plugin ${190000+(n%9999)}`
  };
}

function deriveRepo(asset){
  const a=String(asset);
  if (a.includes(' repo')) return a.replace(/\s*repo$/i,'').trim();
  if (a.includes('/')) return a.split('/').pop().trim();
  if (a.includes(':')) return a.split(':')[0].trim();
  if (a.includes('.')) return a.split('.')[0].replace(/^pay-/,'').replace(/-prod.*/,'')||'service';
  return a.replace(/\s*\([^)]*\)/g,'').trim();
}

function scmFileHint(seed, sid){
  const t=seed.title.toLowerCase();
  if (sid==='sast') return t.includes('injection')?'payments-api/.../ChargeController.java:142':t.includes('xss')?'templates/profile.html':'src/main/...';
  if (sid==='sca') return t.includes('log4')?'pom.xml · log4j-core 2.14.1':'package-lock.json / go.mod';
  if (sid==='secrets') return seed.asset.includes('.py')?seed.asset:seed.asset.includes('workflow')?'.github/workflows/deploy.yml':seed.asset.includes('gist')?'external gist':`.env · ${seed.asset}`;
  if (sid==='container') return 'Dockerfile · dependency layers in repo';
  if (sid==='iac') return iacPathHint(seed);
  return 'manifest / lockfile';
}

function iacPathHint(seed){
  const t=seed.title.toLowerCase();
  if(t.includes('s3')) return 'terraform/modules/s3-bucket/main.tf';
  if(t.includes('rds')||t.includes('ingress')) return 'terraform/network/database.tf';
  if(t.includes('eks')) return 'terraform/eks/cluster.tf';
  return seed.asset.includes('.tf')?seed.asset:'infrastructure/**/*.tf';
}

function buildCodeAssetParts(seed, sid, bp){
  const meta=seedMeta(seed);
  const repo=deriveRepo(seed.asset);
  const orgRepo=`${ORG}/${repo}`;
  const sha=seed.commit||`${seed.id.replace(/[^A-Z0-9]/gi,'').slice(0,7).toLowerCase()}a3f8e92`;
  const pr=seed.pr||(1100+(seed.id.charCodeAt(4)%200));
  const branch=seed.status==='In progress'?`fix/${seed.id.toLowerCase()}`:'main';

  if(sid==='sca'){
    const pkg=seed.cve&&seed.title.includes('log4j')?'log4j-core 2.14.1':scmFileHint(seed,sid);
    return {
      originShort:`${repo} · ${scmFileHint(seed,sid).split(' · ')[0]||'manifest'}`,
      deployShort:seed.asset.includes(':')?seed.asset.split(':').pop():`${repo}:prod`,
      originLines:[
        `① Origin in source`,
        `Repo: github.com/${orgRepo}`,
        `Branch: ${branch} · commit ${sha}`,
        `Path: ${scmFileHint(seed,sid)}`,
        `Package: ${pkg} — where scanner found the vuln`
      ],
      deployLines:[
        `② Deploy artifact`,
        `Service / image: ${seed.asset}`,
        bp?`Registry: ${bp.artifact.name.split('/').pop()}:${bp.artifact.version}`:'',
        bp?`Digest: ${bp.artifact.digest}`:'',
        bp?`Running: ${bp.deployment.cluster} · ${bp.deployment.namespace} · ${bp.deployment.podCount} pods`:'Prod if build reached deploy',
        `Where the vulnerable component exists in prod`
      ].filter(Boolean)
    };
  }
  if(sid==='sast'){
    return {
      originShort:`${repo} · ${scmFileHint(seed,sid).split('/').pop()}`,
      deployShort:`${repo} · prod`,
      originLines:[
        `① Origin in source`,
        `Repo: github.com/${orgRepo}`,
        `File: ${scmFileHint(seed,sid)}`,
        `PR #${pr} · commit ${sha}`,
        `Flaw introduced / detected in source`
      ],
      deployLines:[
        `② Deploy artifact`,
        `Service: ${repo} (payments-api)`,
        bp?`Artifact: ${bp.artifact.version} · ${bp.deployment.tool}`:'Deployed via main → prod',
        bp?`Reachability: ${bp.reachability?.entryPoint||'prod entry path'}`:'',
        `Executable path in production runtime`
      ].filter(Boolean)
    };
  }
  if(sid==='container'){
    const img=seed.asset.includes('/')?seed.asset.split('/').pop():seed.asset;
    return {
      originShort:`${orgRepo} · Dockerfile`,
      deployShort:img,
      originLines:[
        `① Origin in source`,
        `Repo: github.com/${orgRepo}`,
        `Dockerfile / CI build context`,
        `Commit: ${sha} — image built from this repo`,
        `Vuln in layer introduced at build time`
      ],
      deployLines:[
        `② Deploy artifact`,
        `Image: ${seed.asset}`,
        bp?`Digest: ${bp.artifact.digest}`:'',
        bp?`Cluster: ${bp.deployment.cluster} · ${bp.deployment.namespace}`:'',
        bp?`Pods: ${bp.deployment.podCount} · synced ${bp.deployment.syncedAgo}`:'',
        `Where image runs — vuln exists in container`
      ].filter(Boolean)
    };
  }
  if(sid==='iac'){
    return {
      originShort:`${orgRepo} · ${iacPathHint(seed).split('/').pop()}`,
      deployShort:seed.asset.replace(/^arn:aws:[^:]+::/,'').slice(0,40),
      originLines:[
        `① Origin in source`,
        `Repo: github.com/${orgRepo}`,
        `IaC path: ${iacPathHint(seed)}`,
        `PR #${pr} · policy as code`,
        `Misconfiguration defined in Terraform/Bicep`
      ],
      deployLines:[
        `② Deploy target`,
        `Resource: ${seed.asset}`,
        `Account: prod-payments (112233445566)`,
        `Drift check: deployed vs declared`,
        `Where risk lands if this code is applied`
      ]
    };
  }
  return {originShort:orgRepo,deployShort:seed.asset,originLines:[],deployLines:[]};
}

function bpAssetGraphHint(seed, sid, bp){
  if(!CODE_ORIGIN_SCANNERS.has(sid)) return null;
  const p=buildCodeAssetParts(seed,sid,bp);
  return {label:'Asset',sub:`① ${p.originShort}`,sub2:`② ${p.deployShort}`};

function buildScmStation(seed, sid){

  const branch=seed.status==='In progress'?`fix/${seed.id.toLowerCase()}-cve`:seed.status==='Patched'?'main':'main';
  const sha=seed.commit||`${seed.id.replace(/[^A-Z0-9]/gi,'').slice(0,7).toLowerCase()}a3f8e92`;

  return {

}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}

function band(score){if(score>=8)return 'Critical';if(score>=6)return 'High';if(score>=3)return 'Medium';return 'Low';}

function buildScoring(seed){
  const meta=seedMeta(seed);
  const s=seed.score;
  const kev=seed.kev?2.0:1.0;
  const epss=Number(meta.epss.toFixed(2));
  const reach=seed.internet?1.4:1.0;
  const crit=s>=8?2.0:s>=6?1.5:1.0;
  const ctrl=seed.status==='Compensating control'?1.5:seed.status==='Patched'?2.0:1.2;
  const base=5.0;
  return {
    base, result:s.toFixed(1), cvss:meta.cvss, epss,
    expr:`Base ${base} × KEV ${kev} × EPSS ${epss} × Reach ${reach} × Crit ${crit} ÷ Controls ${ctrl} = ${s.toFixed(1)} (CVSS ${meta.cvss})`,
    pills:[
      {l:'KEV match',w:seed.kev?'×2.0':'×1.0'},
      {l:`EPSS ${epss}`,w:`×${epss}`},
      {l:'Reach',w:`×${reach}`},
      {l:'Asset crit',w:`×${crit}`},
      {l:'Controls',w:`÷${ctrl}`}
    ]
  };
}

    {k:'threat',name:'Threat intel',icon:'shield',lines:[`KEV: ${seed.kev?`CVE ${seed.cve||'listed'} · CISA catalog`:'Not listed'}`,`EPSS: ${meta.epss} · 30d Δ ${seed.kev?'+12%':'flat'}`,`CVSS: ${meta.cvss} · ${seed.tool.split(' ')[0]}`,`Exploit: ${seed.kev?'Metasploit · CISA AA24-131A':'No public exploit'}`]},
    {k:'ownership',name:'Ownership',icon:'git',lines:[`Team: ${seed.owner}`,`Jira: ${meta.jira} · ${seed.status}`,`PagerDuty: ${seed.owner.split(' ')[0].toUpperCase()}-oncall`,`Slack: #${seed.owner.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,22)}`]},
    {k:'business',name:'Business context',icon:'shield',lines:[`App: Transaction Processing`,`Tier: ${seed.score>=8?'0 — revenue critical':'2 — internal'}`,`Data: ${seed.internet?'PAN adjacent · tokenized':'Ops metadata'}`,`Compliance: ${/payment|pay/i.test(seed.owner)?'PCI DSS 4.0 · SOX':'SOC2 Type II'}`]},
    {k:'runtime',name:'Runtime controls',icon:'shield',lines:runtimeLines}
  ];
  return stations;
}

function buildOutcomes(seed, sid){
  const meta=seedMeta(seed);
  const o=[];
  const ticket={type:`${meta.jira} · patch`,dest:'Jira Cloud',owner:seed.owner,sla:seed.score>=9?'P0 · 24h':seed.score>=7?'P1 · 72h':'P2 · 14d',auto:'Semi'};
  if(sid==='secrets'||seed.title.toLowerCase().includes('secret')||seed.title.toLowerCase().includes('key')){
    o.push({type:'Rotation runbook',dest:'Vault · IAM',owner:seed.owner,sla:'P0',auto:'Auto'});
    o.push({type:'Usage audit + IR',dest:'SIEM · case mgmt',owner:'Incident Response',sla:'P0',auto:'Manual'});
  } else if(sid==='sca'||sid==='sast'){
    o.push({type:'Auto-fix PR',dest:'GitHub',owner:seed.owner,sla:'PR cycle',auto:'Auto'});
    o.push(ticket);
  } else if(sid==='dast'||sid==='network'||sid==='container'){
    o.push({type:'Compensating control',dest:'WAF · EDR · NDR',owner:'SecOps',sla:'P1',auto:'Semi'});
    o.push(ticket);
  } else {
    o.push(ticket);
    if(seed.status==='Compensating control'||seed.score>=7)
      o.push({type:'EDR containment policy',dest:'CrowdStrike console',owner:'SecOps',sla:'P1',auto:'Semi'});
  }
  if(seed.score>=8.5) o.push({type:'Exec visibility',dest:'Risk dashboard',owner:'GRC',sla:'Weekly',auto:'Auto'});
  return o.slice(0,3);
}

function buildTimeline(seed, sid){
  const meta=seedMeta(seed);
  const repo=deriveRepo(seed.asset);
  const bp=PIPELINE_SCANNERS.has(sid)?buildBuildPipeline(seed,sid):null;
  const scanLine=sid==='network'?{t:'Vuln scan ingested',d:meta.discovered,by:`${seed.tool} · ${meta.plugin}`}
    :sid==='dast'?{t:'DAST proof captured',d:meta.discovered,by:`Burp scan · session 8f2c`}
    :{t:'Finding ingested',d:meta.discovered,by:seed.tool};
  return [
    ...(bp?[{t:'CI/CD artifact linked',d:'52h ago',by:`${bp.build.system} ${bp.build.buildId} · ${bp.artifact.digest}`}]:[]),
    ...(SCM_SCANNERS.has(sid)&&!PIPELINE_SCANNERS.has(sid)?[{t:'SCM commit correlated',d:'48h ago',by:`${ORG}/${repo} @ main`}]:[]),
    scanLine,
    {t:'Exposure record created',d:'47h ago',by:`${seed.id} · score ${seed.score.toFixed(1)}`},
    {t:'Correlation complete',d:'46h ago',by:'Splunk SOAR · CMDB + KEV'},
    {t:`${meta.jira} assigned`,d:'45h ago',by:seed.owner},
    ...(seed.status==='Compensating control'?[{t:'Virtual patch deployed',d:'22h ago',by:'SecOps · WAF custom rule'}]:[]),
    ...(seed.status==='In progress'?[{t:'Change CHG0048211 staging',d:'6h ago',by:seed.owner}]:[]),
    ...(seed.status==='Patched'?[{t:'Rescan clean',d:'14h ago',by:seed.tool}]:[])
  ];
}

function enrich(seed, scannerId){
  const sc=SCANNERS.find(x=>x.id===scannerId);
  const b=band(seed.score);
  const meta=seedMeta(seed);
  const bp=PIPELINE_SCANNERS.has(scannerId)?buildBuildPipeline(seed,scannerId):null;
  const codeParts=CODE_ORIGIN_SCANNERS.has(scannerId)?buildCodeAssetParts(seed,scannerId,bp):null;
  return {...seed,...meta,
    assetOrigin:codeParts?.originShort||null,
    assetDeploy:codeParts?.deployShort||null,
    scannerId,scannerName:sc.scannerLabel,accent:sc.accent,
    severity:b,severityClass:bandClass(b),
    crossLinks:CROSS_LINKS[seed.id]||[],
    scoring:buildScoring(seed),stations:buildStations(seed,scannerId),
    buildPipeline:bp,
    outcomes:buildOutcomes(seed,scannerId),timeline:buildTimeline(seed,scannerId),
    scmRepo:SCM_SCANNERS.has(scannerId)?deriveRepo(seed.asset):null};
}

function getFiltered(){
  const sid=SCANNERS[activeScanner].id;
  return ALL_EXPOSURES.filter(e=>{
    if(e.scannerId!==sid) return false;
    if(filters.kev&&!e.kev) return false;
    if(filters.internet&&!e.internet) return false;
    if(filters.sev.size&&!filters.sev.has(e.severity)) return false;
    if(filters.status.size&&!filters.status.has(e.status)) return false;
    if(filters.owner.size&&!filters.owner.has(e.owner)) return false;
    if(filters.q){
      const q=filters.q.toLowerCase();
      const hay=`${e.title} ${e.cve||''} ${e.asset} ${e.scmRepo||''} ${e.owner} ${e.id}`.toLowerCase();
      if(!hay.includes(q)) return false;
    }

  }).sort((a,b)=>b.score-a.score);
}

function summaryCounts(rows, total){

function truncate(s,n){const t=String(s);return t.length<=n?t:t.slice(0,Math.max(1,n-1))+'…';}
function fitCharsForWidth(w,fontSize,isMono){
  const avg=isMono?5.2:fontSize<=8?5.6:5.9;
  return Math.max(4,Math.floor((w-12)/avg));
}
function fitBoxLine(text,maxChars){
  const s=String(text||'');
  if(!s||s.length<=maxChars) return s;
  if(maxChars<=3) return s.slice(0,maxChars);
  return s.slice(0,maxChars-1)+'…';
}
function corrShortLabel(name){
  const n=String(name);
  const map={
    'Asset graph':'Asset','Asset — origin & deploy':'Asset','Identity graph':'Identity','Threat intel':'Threat',
    'Business context':'Business','Build Pipeline':'Build','Runtime controls':'Runtime',
    'Ownership':'Owner','SCM context':'SCM','Build pipeline':'Build',
    'SBOM lineage':'SBOM','Runtime presence':'Runtime','Reachability':'Reach',
    'Image digest':'Digest','Runtime ctx':'Runtime','CNAPP overlay':'CNAPP',
    'Cross-link DAST/SCA':'X-link','Cross-link SAST':'X-link','Taint analysis':'Taint',
    'Threat intel':'Threat'
  };
  if(map[n]) return map[n];
  return n.replace(/ graph$/i,'').replace(/^Business /,'Biz ');
}
function fitCorrBoxText(label,sub,sub2,w){
  const labelMax=fitCharsForWidth(w,10,false);
  const subMax=fitCharsForWidth(w,9,true);
  const sub2Max=fitCharsForWidth(w,8,false);
  return {
    label:fitBoxLine(corrShortLabel(label),labelMax),
    sub:fitBoxLine(sub,subMax),
    sub2:fitBoxLine(sub2,sub2Max)
  };
}
function stationBoxClass(s){
  if(!s) return '';
  if(s.isPipeline||s.k==='buildPipeline') return 'is-pipeline';
  if(s.k==='runtime') return 'is-runtime';
  return '';
}

const CORR_BOX_W=118,CORR_BOX_H=40,CORR_HUB_R=50;
const CORR_TOP_GAP=26;

function corrTopLayout(hasPipeline){
  if(!hasPipeline) return {W:860,H:360,cx:430,cy:188,topY:44,botY:298,topXs:[100,270,440,610],botXs:[220,430,640],topDims:null};
  const topW=108,buildW=124,topH=54,buildH=60,gap=CORR_TOP_GAP;
  const total=4*topW+buildW+4*gap;
  const W=Math.max(1120,total+120);
  const cx=W/2,cy=196,topY=46,botY=306;
  let x=(W-total)/2+topW/2;
  const topXs=[];
  const topDims=[];
  for(let i=0;i<5;i++){
    const isBuild=i===2;
    const w=isBuild?buildW:topW;
    const h=isBuild?buildH:topH;
    topXs.push(x);
    topDims.push({w,h});
    x+=w/2+gap+w/2;
  }
  const botXs=[W*0.26,W*0.5,W*0.74];
  return {W,H:388,cx,cy,topY,botY,topXs,botXs,topDims};
}

function corrBoxAnchor(bx,by,w,h,tcx,tcy){
  const cx=bx+w/2,cy=by+h/2,dx=tcx-cx,dy=tcy-cy;
  if(Math.abs(dx)<1e-6&&Math.abs(dy)<1e-6) return {x:cx,y:cy};
  const scale=Math.min(Math.abs(w/2/dx),Math.abs(h/2/dy));
  return {x:cx+dx*scale,y:cy+dy*scale};
}

function corrHubAnchor(cx,cy,r,tx,ty){
  const dx=tx-cx,dy=ty-cy,len=Math.hypot(dx,dy)||1;
  return {x:cx+(dx/len)*r,y:cy+(dy/len)*r};
}

function corrSpokePath(hx,hy,bx,by){
  const mx=(hx+bx)/2,my=(hy+by)/2;
  return `M ${hx} ${hy} Q ${mx} ${my} ${bx} ${by}`;
}

function renderCorrBox(cx,cy,label,boxCls,wrapAttrs,opts){
  const w=opts?.w||CORR_BOX_W,h=opts?.h||CORR_BOX_H;
  const rawSub=opts?.sub||'',rawSub2=opts?.sub2||'';
  const fit=fitCorrBoxText(label,rawSub,rawSub2,w);
  const x=cx-w/2,y=cy-h/2;
  const subCls=fit.sub||fit.sub2?' has-sub':'';
  return `<g class="corr-box-wrap" ${wrapAttrs}>
    <foreignObject x="${x}" y="${y}" width="${w}" height="${h}">
      <div xmlns="http://www.w3.org/1999/xhtml" class="corr-box ${boxCls}${subCls}" style="width:${w}px;height:${h}px">
        <span class="corr-box-label">${esc(fit.label)}</span>
        ${fit.sub?`<span class="corr-box-sub">${esc(fit.sub)}</span>`:''}
        ${fit.sub2?`<span class="corr-box-sub2">${esc(fit.sub2)}</span>`:''}
      </div>
    </foreignObject>
  </g>`;
}

function renderCorrelationGraph(e){
  const byKey={};
  e.stations.forEach((s,i)=>{byKey[s.k]={...s,idx:i};});
  const uid=e.id.replace(/[^a-zA-Z0-9]/g,'');
  const hasPipeline=PIPELINE_SCANNERS.has(e.scannerId)&&!!byKey.buildPipeline;
  const layout=corrTopLayout(hasPipeline);
  const {W,H,cx,cy,topY,botY,topXs,botXs,topDims}=layout;
  const title=fitBoxLine(e.title,fitCharsForWidth(96,8.5,false)*2);
  const bpHint=hasPipeline?bpBuildGraphHint(e.buildPipeline):null;
  const assetHint=CODE_ORIGIN_SCANNERS.has(e.scannerId)?bpAssetGraphHint(e,e.scannerId,e.buildPipeline):null;

  const topSlots=hasPipeline?[
    {label:'Finding',boxCls:'is-finding',attrs:'data-finding="1" tabindex="0" role="button" aria-label="Scanner finding"'},
    {label:'Asset',station:byKey.asset,assetHint},
    {label:'Build',station:byKey.buildPipeline,pipelineHint:bpHint},
    {label:'Identity',station:byKey.identity},
    {label:'Runtime',station:byKey.runtime}
  ]:[
    {label:'Finding',boxCls:'is-finding',attrs:'data-finding="1" tabindex="0" role="button" aria-label="Scanner finding"'},
    {label:'Asset',station:byKey.asset},
    {label:'Identity',station:byKey.identity},
    {label:'Runtime',station:byKey.runtime}
  ];
  const botSlots=[
    {label:'Ownership',station:byKey.ownership},
    {label:'Threat intel',station:byKey.threat},
    {label:'Business context',station:byKey.business}
  ];

  const flowLines=[];
  for(let i=0;i<topXs.length-1;i++){
    const w0=topDims?topDims[i].w:CORR_BOX_W;
    const w1=topDims?topDims[i+1].w:CORR_BOX_W;
    flowLines.push(`<line class="corr-flow-line" x1="${topXs[i]+w0/2+6}" y1="${topY}" x2="${topXs[i+1]-w1/2-6}" y2="${topY}" marker-end="url(#corr-flow-${uid})"/>`);
  }

  const allPts=[
    ...topXs.map((x,i)=>({x,y:topY,w:topDims?topDims[i].w:CORR_BOX_W,h:topDims?topDims[i].h:CORR_BOX_H})),
    ...botXs.map(x=>({x,y:botY,w:CORR_BOX_W,h:CORR_BOX_H}))
  ];
  const spokes=allPts.map(pt=>{
    const hub=corrHubAnchor(cx,cy,CORR_HUB_R,pt.x,pt.y);
    const box=corrBoxAnchor(pt.x-pt.w/2,pt.y-pt.h/2,pt.w,pt.h,cx,cy);
    const isRuntime=pt.y===topY&&pt.x===topXs[topXs.length-1];
    const cls=isRuntime?'corr-spoke is-runtime':'corr-spoke';
    return `<path class="${cls}" d="${corrSpokePath(hub.x,hub.y,box.x,box.y)}" marker-end="url(#corr-spoke-${uid})"/>`;
  }).join('');

  const topBoxes=topSlots.map((slot,i)=>{
    const hint=slot.pipelineHint||slot.assetHint;
    const label=hint?.label||(slot.station?corrShortLabel(slot.station.name):slot.label);
    const boxCls=slot.station?stationBoxClass(slot.station):slot.boxCls;
    const attrs=slot.station
      ?`data-station-idx="${slot.station.idx}" tabindex="0" role="button" aria-label="${esc(slot.station.name)}${hint?.sub?' · '+hint.sub:''}"`
      :slot.attrs;
    let opts=topDims?{w:topDims[i].w,h:topDims[i].h,sub:hint?.sub||'',sub2:hint?.sub2||''}:{};
    if(assetHint&&i===1&&topDims) opts={...opts,h:Math.max(topDims[i].h,58)};
    return renderCorrBox(topXs[i],topY,label,boxCls,attrs,opts);
  }).join('');

  const botBoxes=botSlots.map((slot,i)=>{
    const st=slot.station;
    const label=st?corrShortLabel(st.name):slot.label;
    const boxCls=st?stationBoxClass(st):'';
    const attrs=st?`data-station-idx="${st.idx}" tabindex="0" role="button" aria-label="${esc(st.name)}"`:'';
    return renderCorrBox(botXs[i],botY,label,boxCls,attrs,{w:CORR_BOX_W,h:CORR_BOX_H});
  }).join('');

  const hubFo=`<foreignObject x="${cx-52}" y="${cy-52}" width="104" height="104">
    <div xmlns="http://www.w3.org/1999/xhtml" class="corr-hub-inner">
      <div class="corr-hub-label">Exposure</div>
      <div class="corr-hub-score">${e.score.toFixed(1)}</div>
      <div class="corr-hub-title">${esc(title)}</div>
      <div class="corr-hub-sub">${esc(e.id)}</div>
    </div>
  </foreignObject>`;

  return `<svg class="corr-graph" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" aria-label="Correlation graph for ${esc(e.id)}">
    <defs>
      <marker id="corr-flow-${uid}" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="var(--correlation)"/></marker>
      <marker id="corr-spoke-${uid}" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--correlation)" opacity=".8"/></marker>
      <filter id="corr-glow-${uid}" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#2563eb" flood-opacity=".1"/></filter>
      <clipPath id="corr-hub-clip-${uid}"><circle cx="${cx}" cy="${cy}" r="${CORR_HUB_R-2}"/></clipPath>
    </defs>
    <g class="corr-spokes">${spokes}</g>
    <g filter="url(#corr-glow-${uid})">
      <circle cx="${cx}" cy="${cy}" r="${CORR_HUB_R}" fill="var(--panel)" stroke="var(--correlation)" stroke-width="2"/>
      <circle cx="${cx}" cy="${cy}" r="${CORR_HUB_R-8}" class="corr-hub-ring" stroke-width="1"/>
    </g>
    <g class="corr-flow">${flowLines.join('')}</g>
    <g class="corr-boxes">${topBoxes}${botBoxes}</g>
    <g clip-path="url(#corr-hub-clip-${uid})">${hubFo}</g>
  </svg>`;
}

function clamp(n,a,b){return Math.max(a,Math.min(b,n));}
function getSvgViewBoxWH(svg){
  const vb=(svg.getAttribute('viewBox')||'0 0 860 360').trim().split(/\s+/).map(Number);
  return {w:vb[2]||860,h:vb[3]||360};
}
function applySvgZoom(svg,scale){
  const {w,h}=getSvgViewBoxWH(svg);
  svg.style.width=(w*scale)+'px';
  svg.style.height=(h*scale)+'px';
  svg.style.maxWidth='none';
  svg.style.flex='none';
  svg.style.display='block';
}
function bindDiagramZoom(panel){
  const wrap=panel.querySelector('.corr-graph-wrap');
  const controls=panel.querySelector('[data-zoom-controls]');
  const svg=panel.querySelector('svg.corr-graph');
  if(!wrap||!controls||!svg) return;
  if(controls.dataset.bound==='1') return;
  controls.dataset.bound='1';
  const key='em-diagram-scale';
  let scale=1;
  try{scale=parseFloat(localStorage.getItem(key)||'1');}catch(e){}
  scale=clamp(scale,0.6,2.5);
  applySvgZoom(svg,scale);
  const setScale=(next)=>{
    scale=clamp(next,0.6,2.5);
    applySvgZoom(svg,scale);
    try{localStorage.setItem(key,String(scale));}catch(e){}
  };
  controls.querySelectorAll('button[data-zoom]').forEach(btn=>{
    btn.onclick=()=>{
      const dir=btn.dataset.zoom;
      setScale(scale + (dir==='in'?0.15:-0.15));
    };
  });
  controls.querySelector('[data-zoom-reset]')?.addEventListener('click',()=>setScale(1));
}

function bindCorrelationPanel(panel, stations, exposure){
  const detailEl=panel.querySelector('.corr-node-detail');
  const sc=SCANNERS.find(x=>x.id===exposure.scannerId);
  const clearSel=()=>panel.querySelectorAll('.corr-box-wrap').forEach(w=>w.classList.remove('selected'));
  const showStation=(idx)=>{
    const s=stations[idx];
    if(!s||!detailEl) return;
    clearSel();
    panel.querySelector(`.corr-box-wrap[data-station-idx="${idx}"]`)?.classList.add('selected');
    if(s.isPipeline||s.k==='buildPipeline'){
      detailEl.innerHTML=`<div class="bp-detail-wrap">${renderBuildPipelineDetail(exposure)}</div>`;
      return;
    }
    if(s.dualAsset){
      detailEl.innerHTML=`
        <div class="station-head">${icon(s.icon,14)}<span>${esc(s.name)}</span></div>
        <p class="asset-dual-hint">Code-origin scanners tie the vuln to <strong>where it was introduced</strong> and <strong>where it runs</strong>.</p>
        <div class="asset-dual-grid">
          <div class="asset-dual-col asset-dual-origin">
            ${s.originLines.map(l=>l.startsWith('①')?`<div class="asset-dual-section">${esc(l)}</div>`:`<div class="station-line">${esc(l)}</div>`).join('')}
          </div>
          <div class="asset-dual-col asset-dual-deploy">
            ${s.deployLines.map(l=>l.startsWith('②')?`<div class="asset-dual-section">${esc(l)}</div>`:`<div class="station-line">${esc(l)}</div>`).join('')}
          </div>
        </div>`;
      return;
    }
    const scm=stations.find(x=>x.scm);
    const extra=idx>=0&&stations[idx]?.k==='asset'&&scm&&!exposure.buildPipeline&&!CODE_ORIGIN_SCANNERS.has(exposure.scannerId)
      ?`<div class="station-line" style="margin-top:8px;font-weight:700;color:var(--accent)">${esc(scm.name)}</div>${scm.lines.map(l=>`<div class="station-line">${esc(l)}</div>`).join('')}`
      :'';
    detailEl.innerHTML=`
      <div class="station-head">${icon(s.icon,14)}<span>${esc(s.name)}</span></div>
      ${s.lines.map(l=>`<div class="station-line">${esc(l)}</div>`).join('')}${extra}`;
  };
  const showFinding=()=>{
    if(!detailEl) return;
    clearSel();
    panel.querySelector('.corr-box-wrap[data-finding]')?.classList.add('selected');
    detailEl.innerHTML=`
      <div class="station-head">${icon(sc?.icon||'shield',14)}<span>Scanner finding</span></div>
      <div class="station-line">${esc(exposure.tool)}</div>
      <div class="station-line">${esc(exposure.title)}</div>
      <div class="station-line">${exposure.cve?esc(exposure.cve):`Severity: ${esc(exposure.severity)}`}</div>`;
  };
  const bindWrap=(wrap,fn)=>{
    wrap.onclick=fn;
    wrap.onkeydown=ev=>{if(ev.key==='Enter'||ev.key===' '){ev.preventDefault();fn();}};
  };
  panel.querySelectorAll('.corr-box-wrap[data-station-idx]').forEach(w=>{
    bindWrap(w,()=>showStation(+w.dataset.stationIdx));
  });
  const finding=panel.querySelector('.corr-box-wrap[data-finding]');
  if(finding) bindWrap(finding,showFinding);
  const assetIdx=stations.findIndex(s=>s.k==='asset');
  if(assetIdx>=0) showStation(assetIdx);
  else if(stations.length) showStation(0);
  else showFinding();
  panel.querySelectorAll('[data-corr-view]').forEach(btn=>{
    btn.onclick=()=>{
      const v=btn.dataset.corrView;
      panel.querySelectorAll('[data-corr-view]').forEach(b=>b.classList.toggle('on',b.dataset.corrView===v));
      panel.querySelector('.corr-graph-panel').hidden=v!=='graph';
      panel.querySelector('.corr-cards-panel').hidden=v!=='cards';
    };
  });
  bindDiagramZoom(panel);
}

function renderStationCard(s){
  if(s.dualAsset){
    return `<div class="station-card asset-dual-card">
      <div class="station-head">${icon(s.icon,14)}<span>${esc(s.name)}</span></div>
      <div class="asset-dual-grid asset-dual-grid-compact">
        <div class="asset-dual-col asset-dual-origin">
          ${s.originLines.map(l=>l.match(/^①/)?`<div class="asset-dual-section">${esc(l)}</div>`:`<div class="station-line">${esc(l)}</div>`).join('')}
        </div>
        <div class="asset-dual-col asset-dual-deploy">
          ${s.deployLines.map(l=>l.match(/^②/)?`<div class="asset-dual-section">${esc(l)}</div>`:`<div class="station-line">${esc(l)}</div>`).join('')}
        </div>
      </div>
    </div>`;
  }
  return `<div class="station-card ${s.scm?'scm-station':''}"><div class="station-head">${icon(s.icon,14)}<span>${esc(s.name)}</span></div>${s.lines.map(l=>`<div class="station-line">${esc(l)}</div>`).join('')}</div>`;
}

function renderDetail(e){
  const corrSub=e.buildPipeline?` · pipeline: ${esc(e.buildPipeline.repo.name)}`:e.scmRepo?` · SCM: ${esc(e.scmRepo)}`:'';
  const pills=e.scoring.pills.map(p=>`<span class="score-pill">${esc(p.l)} <strong>${esc(p.w)}</strong></span>`).join('');
  const outs=e.outcomes.map(o=>`
    <div class="outcome-card">
      <div class="outcome-type">${esc(o.type)}</div>
      <a class="outcome-dest" href="#">${esc(o.dest)}</a>
      <div class="outcome-meta">${esc(o.owner)} · ${esc(o.sla)} · <span class="auto-pill">${esc(o.auto)}</span></div>
    </div>`).join('');
  const tl=e.timeline.map(t=>`
    <div class="tl-item"><div class="tl-dot"></div><div><strong>${esc(t.t)}</strong> — ${esc(t.d)}<span class="tl-sub">${esc(t.by)}</span></div></div>`).join('');
  const cross=e.crossLinks.length?`<div class="cross-links-strip"><span class="cross-links-label">Also found by</span>${e.crossLinks.map(c=>{
    const t=ALL_EXPOSURES.find(x=>x.id===c.id);
    const scanner=SCANNERS.find(s=>s.id===t?.scannerId);
    return `<button type="button" class="cross-link-btn" data-jump="${c.id}">${icon(scanner?.icon||'shield',14)}<span class="cross-id">${c.id}</span><span class="cross-by">${esc(c.by)}</span><span class="cross-desc">${esc(c.desc||t?.title||'')}</span></button>`;
  }).join('')}</div>`:'';
  return `
    <div class="detail-panel" id="detail-${e.id}">
      <div class="detail-head">
        <div>
          <div class="detail-title">${esc(e.title)}</div>
          <div class="detail-meta">${e.cve?`<span>${esc(e.cve)}</span> · `:''}<span>${esc(e.scannerName)}</span> · <span>${esc(e.tool)}</span> · <span class="${e.severityClass}">${e.severity}</span></div>
          ${cross}
        </div>
        <div class="detail-score-block">
          <div class="detail-score ${e.severityClass}">${e.score.toFixed(1)}</div>
          <div class="detail-expr">${esc(e.scoring.expr)}</div>
        </div>
        <button type="button" class="detail-close" aria-label="Close detail" data-close>&times;</button>
      </div>
      <div class="detail-section corr-panel" data-exp-id="${e.id}">
        <div class="corr-section-head">
          <h4>Correlation breakdown (${stationCountLabel(e)}${corrSub})</h4>
          <div class="corr-view-toggle">
            <button type="button" class="corr-view-btn on" data-corr-view="graph">Graph</button>
            <button type="button" class="corr-view-btn" data-corr-view="cards">Cards</button>
          </div>
        </div>
        <div class="corr-graph-wrap corr-graph-panel">
          <div class="diagram-zoom-controls" data-zoom-controls>
            <button type="button" data-zoom="out" aria-label="Zoom out">−</button>
            <button type="button" data-zoom="in" aria-label="Zoom in">+</button>
            <button type="button" data-zoom-reset aria-label="Reset zoom">Reset</button>
          </div>
          <div class="diagram-zoom-canvas" data-zoom-canvas>
            ${renderCorrelationGraph(e)}
          </div>
          <div class="corr-node-detail"></div>
        </div>
        <div class="corr-cards-panel" hidden>${e.buildPipeline?renderStationCards(e):`<div class="station-grid">${e.stations.map(s=>renderStationCard(s)).join('')}</div>`}</div>
      </div>
      <div class="detail-section"><h4>Scoring formula</h4><div class="formula-chain">${pills}<span class="formula-eq">= ${e.score.toFixed(1)}</span></div></div>
      <div class="detail-section"><h4>Mobilization plan</h4><div class="outcome-row">${outs}</div></div>
      <div class="detail-section"><h4>Activity</h4><div class="timeline">${tl}</div></div>
    </div>`;
}

function renderList(){
  const sid=SCANNERS[activeScanner].id;
  const total=ALL_EXPOSURES.filter(e=>e.scannerId===sid).length;
  const rows=getFiltered();
  document.getElementById('summaryLine').textContent=summaryCounts(rows,total);
  document.getElementById('mainTitle').textContent='Exposure triage queue';
  document.getElementById('mainSub').textContent=SCANNERS[activeScanner].name+' — prioritized after correlation & scoring';
  document.documentElement.style.setProperty('--accent',SCANNERS[activeScanner].accent);

  listEl.innerHTML=rows.map((e,i)=>{
    const open=expandedId===e.id;
    const slaCls=e.sla.includes('Overdue')?'sla-overdue':e.sla.includes('h left')?'sla-urgent':'';
    return `
    <div class="exp-wrap ${open?'open':''}" data-id="${e.id}">
      <div class="exp-row ${i===focusRow?'focused':''}" role="button" tabindex="0" aria-expanded="${open}" aria-label="Exposure ${e.id} score ${e.score}" data-row="${e.id}">
        <span class="score-badge ${e.severityClass}">${e.score.toFixed(1)}</span>
        <span class="col-title">${esc(e.title)}</span>
        <span class="col-asset">${e.assetOrigin&&e.assetDeploy?`<span class="col-asset-origin" title="Origin in source">${esc(e.assetOrigin)}</span><span class="col-asset-arrow"> → </span><span class="col-asset-deploy" title="Deploy artifact">${esc(e.assetDeploy)}</span>`:esc(e.asset)}</span>
        <span class="col-kev">${e.kev?'<span class="kev-pill">KEV</span>':''}</span>
        <span class="col-owner">${esc(e.owner)}</span>
        <span class="col-status"><span class="status-pill status-${e.status.replace(/\s+/g,'-').toLowerCase()}" title="${esc(e.status)}">${esc(statusLabel(e.status))}</span></span>
        <span class="col-sla ${slaCls}">${esc(e.sla)}</span>
        <span class="col-chev">${icon('chev',16)}</span>
      </div>
      ${open?renderDetail(e):''}
    </div>`;
  }).join('') || '<div class="empty">No exposures match filters.</div>';

  listEl.querySelectorAll('.exp-row').forEach(row=>{
    const id=row.dataset.row;
    const toggle=()=>{expandedId=expandedId===id?null:id;renderList();};
    row.onclick=toggle;
    row.onkeydown=ev=>{if(ev.key==='Enter'||ev.key===' '){ev.preventDefault();toggle();}};
  });
  listEl.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>{expandedId=null;renderList();});
  listEl.querySelectorAll('[data-jump]').forEach(b=>b.onclick=()=>{
    const t=ALL_EXPOSURES.find(x=>x.id===b.dataset.jump);
    if(!t) return;
    activeScanner=SCANNERS.findIndex(s=>s.id===t.scannerId);
    expandedId=t.id; render();
  });
  listEl.querySelectorAll('.corr-panel').forEach(panel=>{
    const exp=ALL_EXPOSURES.find(x=>x.id===panel.dataset.expId);
    if(exp) bindCorrelationPanel(panel, exp.stations, exp);
  });
}

function renderChips(){
  const sid=SCANNERS[activeScanner].id;
  const rows=ALL_EXPOSURES.filter(e=>e.scannerId===sid);
  const owners=[...new Set(rows.map(r=>r.owner))].sort();
  const chipHost=document.getElementById('filterChips');
  const mk=(label,set,val)=>`<button type="button" class="chip ${set.has(val)?'on':''}" data-kind="${label}" data-val="${esc(val)}" title="${label==='status'?esc(val):''}">${esc(label==='status'?statusLabel(val):val)}</button>`;
  chipHost.innerHTML=`
    <span class="chip-group">Severity ${['Critical','High','Medium','Low'].map(s=>mk('sev',filters.sev,s)).join('')}</span>
    <span class="chip-group">Status ${['Open','In progress','Compensating control','Patched','Risk accepted'].map(s=>mk('status',filters.status,s)).join('')}</span>
    <span class="chip-group">Owner ${owners.slice(0,5).map(o=>mk('owner',filters.owner,o)).join('')}</span>
    <button type="button" class="chip toggle ${filters.kev?'on':''}" data-toggle="kev">KEV only</button>
    <button type="button" class="chip toggle ${filters.internet?'on':''}" data-toggle="internet">Internet-facing</button>
    <button type="button" class="chip clear" data-clear>Clear filters</button>`;
  chipHost.querySelectorAll('.chip[data-kind]').forEach(c=>{
    c.onclick=()=>{
      const kind=c.dataset.kind; const val=c.dataset.val;
      const set=filters[kind];
      if(set.has(val)) set.delete(val); else set.add(val);
      renderChips(); renderList();
    };
  });
  chipHost.querySelectorAll('[data-toggle]').forEach(c=>{
    c.onclick=()=>{filters[c.dataset.toggle]=!filters[c.dataset.toggle]; renderChips(); renderList();};
  });
  chipHost.querySelectorAll('[data-clear]').forEach(c=>{
    c.onclick=()=>{filters={q:'',sev:new Set(),status:new Set(),owner:new Set(),kev:false,internet:false};
      document.getElementById('searchInput').value=''; renderChips(); renderList();};
  });
}

function render(){renderSidebar();renderChips();renderList();}

document.getElementById('searchInput').oninput=e=>{filters.q=e.target.value;renderList();};
document.getElementById('themeToggle').onclick=()=>{
  const t=app.dataset.theme==='dark'?'light':'dark';
  app.dataset.theme=t; document.documentElement.dataset.theme=t;
  try{localStorage.setItem('em-theme',t);}catch(e){}
};
try{const s=localStorage.getItem('em-theme');if(s){app.dataset.theme=s;document.documentElement.dataset.theme=s;}}catch(e){}

document.addEventListener('keydown',e=>{
  const rows=getFiltered();
  if(!rows.length) return;
  if(e.key==='Escape'){expandedId=null;renderList();return;}
  if(e.key==='ArrowDown'){e.preventDefault();focusRow=Math.min(focusRow+1,rows.length-1);if(expandedId)expandedId=rows[focusRow].id;renderList();return;}
  if(e.key==='ArrowUp'){e.preventDefault();focusRow=Math.max(focusRow-1,0);if(expandedId)expandedId=rows[focusRow].id;renderList();return;}
  if(e.key==='Enter'&&document.activeElement?.classList.contains('exp-row')){
    const id=document.activeElement.dataset.row; expandedId=expandedId===id?null:id; renderList();
  }
});

render();

</script>
</body>
</html>
